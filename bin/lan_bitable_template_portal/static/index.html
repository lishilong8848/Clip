        source_table_id: record.source_table_id || "",
        specialty: uploadSpecialty,
        record_id: record.record_id,
        building_codes: record.building_codes || [],
        title: type === "repair" ? draft.content : titleForRecord(record),
        level: type === "repair" ? (draft.level || "") : (type === "change" ? levelForRecord(record) : ""),
        start_time: draft.start_time,
        end_time: draft.end_time,
        location: draft.location,
        content: draft.content,
        reason: draft.reason,
        impact: draft.impact,
        progress: draft.progress,
        repair_device: type === "repair" ? (draft.repair_device || "") : "",
        repair_fault: type === "repair" ? (draft.repair_fault || "") : "",
        fault_type: type === "repair" ? (draft.fault_type || "") : "",
        repair_mode: type === "repair" ? (draft.repair_mode || "") : "",
        discovery: type === "repair" ? (draft.discovery || "") : "",
        symptom: type === "repair" ? (draft.symptom || "") : "",
        solution: type === "repair" ? (draft.solution || "") : "",
        fault_time: type === "repair" ? (draft.end_time || "") : "",
        expected_time: type === "repair" ? (draft.start_time || "") : "",
        operation_id: draft.operation_id || (draft.operation_id = opFor(`${recordId}:start`)),
      }, recordId);
      saveDraftState();
    }

    async function sendAction(payload, lineKey) {
      const localKey = jobLocalKey(payload, lineKey);
      try {
        setActionButtonsDisabled(lineKey, true);
        setJobLine(lineKey, "提交中，准备加入上传队列", "busy");
        const data = await api("/api/workbench-actions", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        const jobId = data.job_id;
        if (payload.operation_id) state.jobToOpKey.set(jobId, payload.operation_id);
        rememberJobState(localKey, {
          job_id: jobId,
          line_key: lineKey,
          payload,
          operation_id: payload.operation_id || "",
          phase: "queued",
          text: `已加入上传队列 ${jobId.slice(0, 8)}`,
          status: "busy",
        });
        const draft = state.drafts.get(lineKey);
        if (draft) {
          draft.job_id = jobId;
          saveDraftState();
        }
        setJobLine(lineKey, `已加入上传队列 ${jobId.slice(0, 8)}`, "busy");
        pollJob(jobId, lineKey, localKey);
      } catch (err) {
        setJobLine(lineKey, err.message || "提交失败", "failed");
        setActionButtonsDisabled(lineKey, false);
        rememberJobState(localKey, {
          line_key: lineKey,
          payload,
          phase: "failed",
          text: err.message || "提交失败",
          status: "failed",
        });
      }
    }

    function pollJob(jobId, lineKey, localKey = "") {
      if (state.polling.has(jobId)) return;
      state.polling.add(jobId);
      const tick = async () => {
        try {
          const job = await api(`/api/jobs/${encodeURIComponent(jobId)}`);
          const phase = job.phase || "";
          if (phase === "success") {
            setJobLine(lineKey, `已完成，多维记录 ${job.record_id || ""}`, "success");
            setActionButtonsDisabled(lineKey, true);
            if (state.drafts.has(lineKey)) {
              state.selected.delete(lineKey);
              state.drafts.delete(lineKey);
              saveDraftState();
            }
            const operationId = state.jobToOpKey.get(jobId);
            if (operationId) {
              for (const [key, value] of Array.from(state.actionOps.entries())) {
                if (value === operationId) state.actionOps.delete(key);
              }
              state.jobToOpKey.delete(jobId);
            }
            state.polling.delete(jobId);
            forgetJobState(localKey);
            await refreshWorkbench();
            return;
          }
          if (phase === "failed") {
            const jobType = job.prepared?.work_type || job.request?.work_type || "maintenance";
            const prefix = jobType === "change"
              ? "变更上传失败"
              : jobType === "repair"
                ? "检修上传失败"
                : (job.message_sent ? "消息已发送，上传失败" : "操作失败");
            const text = `${prefix}: ${job.error || job.upload_message || ""}`;
            setJobLine(lineKey, text, "failed");
            setActionButtonsDisabled(lineKey, false);
            rememberJobState(localKey, {
              job_id: jobId,
              line_key: lineKey,
              phase: "failed",
              text,
              status: "failed",
              message_sent: Boolean(job.message_sent),
            });
            if (!job.message_sent) {
              const operationId = state.jobToOpKey.get(jobId);
              if (operationId) {
                for (const [key, value] of Array.from(state.actionOps.entries())) {
                  if (value === operationId) state.actionOps.delete(key);
                }
              }
            }
            state.polling.delete(jobId);
            return;
          }
          const queuedLabel = job.queue_position
            ? `排队中，第 ${job.queue_position} 位`
            : "排队中";
          const label = {
            queued: queuedLabel,
            sending_message: "队列已轮到，正在发送个人飞书消息",
            uploading: job.prepared?.work_type === "change"
              ? "正在上传变更多维"
              : job.prepared?.work_type === "repair"
                ? "正在上传检修多维"
                : "个人消息已发送，正在上传多维",
          }[phase] || "处理中";
          setJobLine(lineKey, label, "busy");
          setActionButtonsDisabled(lineKey, true);
          rememberJobState(localKey, {
            job_id: jobId,
            line_key: lineKey,
            phase,
            text: label,
            status: "busy",
          });
          setTimeout(tick, 1200);
        } catch (err) {
          const lost = /任务不存在|404/.test(err.message || "");
          const text = lost ? "任务状态已丢失，请核对多维后重试" : (err.message || "任务查询失败");
          setJobLine(lineKey, text, "failed");
          setActionButtonsDisabled(lineKey, false);
          rememberJobState(localKey, {
            job_id: jobId,
            line_key: lineKey,
            phase: lost ? "lost" : "failed",
            text,
            status: "failed",
          });
          state.polling.delete(jobId);
        }
      };
      setTimeout(tick, 700);
    }

    function restoreJobState() {
      for (const [localKey, saved] of Array.from(state.jobStates.entries())) {
        const lineKey = saved.line_key || "";
        const jobId = saved.job_id || "";
        if (!lineKey) continue;
        const visibleLine = document.querySelector(`[data-job-line="${CSS.escape(lineKey)}"]`);
        if (!visibleLine && !hasLiveJobTarget(lineKey, saved)) {
          state.jobStates.delete(localKey);
          saveJobState();
          continue;
        }
        if (visibleLine) setJobLine(lineKey, saved.text || "任务处理中", saved.status || "busy");
        if (["queued", "sending_message", "uploading"].includes(saved.phase || "") && jobId) {
          if (visibleLine) setActionButtonsDisabled(lineKey, true);
          pollJob(jobId, lineKey, localKey);
        } else if (["failed", "lost"].includes(saved.phase || "")) {
          if (visibleLine) setActionButtonsDisabled(lineKey, false);
        }
      }
    }

    function hasLiveJobTarget(lineKey, saved) {
      if (state.selected.has(lineKey) || state.drafts.has(lineKey)) return true;
      const payload = saved?.payload || {};
      const workType = payload.work_type || "";
      const source = payload.source_record_id || payload.record_id || payload.active_item_id || "";
      return state.records.some((record) => {
        if (workType && (record.work_type || "maintenance") !== workType) return false;
        return recordKey(record) === lineKey || (source && record.record_id === source);
      }) || state.ongoing.some((item) => {
        if (workType && (item.work_type || "maintenance") !== workType) return false;
        return [item.active_item_id, item.record_id, item.source_record_id].some((value) => value && (value === lineKey || value === source));
      });
    }

    async function sendAllStart() {
      const ids = Array.from(state.selected);
      for (const id of ids) {
        await sendStart(id);
      }
    }

    function bindWorkspaceHover() {
      const workspace = $("workspace");
      if (!workspace) return;
      const focusClasses = ["focus-left", "focus-middle", "focus-right"];
      const setFocus = (zone) => {
        workspace.classList.remove(...focusClasses);
        if (zone) workspace.classList.add(`focus-${zone}`);
      };
      workspace.querySelectorAll("[data-workspace-zone]").forEach((panel) => {
        panel.addEventListener("mouseenter", () => setFocus(panel.dataset.workspaceZone || ""));
        panel.addEventListener("focusin", () => setFocus(panel.dataset.workspaceZone || ""));
      });
      workspace.addEventListener("mouseleave", () => setFocus(""));
      workspace.addEventListener("focusout", (event) => {
        if (!workspace.contains(event.relatedTarget)) setFocus("");
      });
    }

    $("refreshBtn").addEventListener("click", refreshWorkbench);
    $("refreshOngoingBtn").addEventListener("click", refreshWorkbench);
    $("syncSourceBtn").addEventListener("click", syncSource);
    $("switchScopeBtn").addEventListener("click", () => showGate("maintenance"));
    $("homeBtn").addEventListener("click", () => showGate("home"));
    $("clearSelectionBtn").addEventListener("click", () => {
      state.selected.clear();
      state.drafts.clear();
      saveDraftState();
      render();
    });
    $("sendAllStartBtn").addEventListener("click", sendAllStart);
    $("monthSelect").addEventListener("change", (e) => {
      state.filters.month = e.target.value;
      refreshWorkbench();
    });
    $("specialtySelect").addEventListener("change", (e) => {
      state.filters.specialty = e.target.value;
      refreshWorkbench();
    });
    $("searchInput").addEventListener("input", (e) => {
      state.filters.search = e.target.value || "";
      renderRecords();
      renderWorkTypeTabs();
    });

    renderGate();
    bindWorkspaceHover();
    if (state.gateMode === "maintenance") loadScopeOverview();
    if (state.gateMode === "handover") loadHandoverLinks();
    window.addEventListener("popstate", () => {
      const scope = urlScope();
      const mode = urlMode();
      state.scope = scope;
      if (scope) {
        $("gate").classList.add("hidden");
        $("app").classList.remove("hidden");
        loadBootstrap().catch((err) => {
          setSyncStatus(err.message || "加载失败", []);
        });
      } else {
        state.gateMode = ["maintenance", "handover"].includes(mode) ? mode : "home";
        $("app").classList.add("hidden");
        $("gate").classList.remove("hidden");
        renderGate();
        if (state.gateMode === "maintenance") loadScopeOverview();
        if (state.gateMode === "handover") loadHandoverLinks();
      }
    });
    if (state.scope) selectScope(state.scope, { replace: true }).catch((err) => {
      setSyncStatus(err.message || "加载失败", []);
    });
  </script>
</body>
</html>

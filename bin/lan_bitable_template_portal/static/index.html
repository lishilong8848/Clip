<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>南通基地-运维灯塔工作台</title>
  <style>
    :root {
      --bg: #eef3f5;
      --ink: #132331;
      --muted: #607080;
      --line: #d3dde4;
      --panel: #ffffff;
      --panel-2: #f7fafb;
      --green: #0b6b58;
      --green-2: #084e43;
      --blue: #1f5f99;
      --amber: #a96805;
      --red: #aa3c3c;
      --soft-green: #e3f3ef;
      --soft-blue: #e6f0f8;
      --soft-amber: #fff4db;
      --soft-red: #fff0f0;
      --shadow: 0 16px 40px rgba(18, 35, 49, 0.10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(11, 107, 88, 0.05) 1px, transparent 1px),
        linear-gradient(180deg, #f8fbfc 0%, var(--bg) 100%);
      background-size: 32px 32px, 100% 100%;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .hidden { display: none !important; }

    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .gate-inner {
      position: relative;
      width: min(980px, 100%);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .gate h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .gate-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 150px;
      margin-bottom: 12px;
      text-align: center;
    }

    .gate-logo {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 118px;
      max-width: 24%;
      height: auto;
      object-fit: contain;
    }

    .gate p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .auth-panel {
      margin: 0 0 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 12px;
      color: var(--muted);
      line-height: 1.55;
    }

    .auth-panel strong { color: var(--ink); }

    .auth-panel .row-actions {
      margin-top: 10px;
    }

    .auth-user {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .scope-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 12px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .scope-btn,
    .feature-btn {
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      text-align: left;
      padding: 14px;
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
    }

    .scope-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
      margin-top: 10px;
    }

    .scope-metric {
      min-height: 24px;
      padding: 4px 6px;
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .scope-btn:hover,
    .feature-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(11, 107, 88, 0.55);
      box-shadow: 0 12px 22px rgba(11, 107, 88, 0.12);
    }

    .scope-btn strong,
    .feature-btn strong {
      display: block;
      margin-bottom: 8px;
      font-size: 20px;
    }

    .scope-btn span,
    .feature-btn span {
      color: var(--muted);
      font-size: 12px;
    }

    .gate-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .settings-panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 12px;
    }

    .link-settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 86px;
      height: auto;
      flex: none;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .brand .scope {
      min-width: 54px;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--soft-green);
      color: var(--green-2);
      font-weight: 700;
      text-align: center;
    }

    .statusbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .sync-status {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
    }

    .pill.warning {
      background: var(--soft-amber);
      color: var(--amber);
      border-color: #f0d393;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: clamp(250px, 24vw, 340px) minmax(500px, 1.34fr) minmax(360px, 0.95fr);
      gap: 12px;
      padding: 12px;
      transition: grid-template-columns 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .workspace.focus-left {
      grid-template-columns: clamp(250px, 24vw, 340px) minmax(500px, 1.34fr) minmax(360px, 0.95fr);
    }

    .workspace.focus-middle {
      grid-template-columns: clamp(250px, 24vw, 340px) minmax(680px, 1.78fr) minmax(260px, 0.58fr);
    }

    .workspace.focus-right {
      grid-template-columns: clamp(250px, 24vw, 340px) minmax(340px, 0.82fr) minmax(650px, 1.72fr);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: minmax(260px, 0.7fr) minmax(420px, 1.3fr);
      gap: 12px;
      padding: 12px 12px 0;
    }

    .summary-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px 12px;
      overflow: hidden;
    }

    .summary-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      padding: 9px;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 20px;
    }

    .timeline {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 2px;
    }

    .timeline-item {
      min-width: 230px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      padding: 8px;
      cursor: pointer;
    }

    .timeline-item:hover {
      border-color: rgba(11, 107, 88, 0.55);
      background: #f6fffb;
    }

    .timeline-title {
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .work-detail {
      margin-top: 8px;
      padding: 8px;
      border-radius: 7px;
      background: rgba(255,255,255,0.82);
      border: 1px dashed var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .work-detail strong { color: var(--ink); }

    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
      transition: box-shadow 260ms ease, border-color 260ms ease, opacity 260ms ease, transform 260ms ease;
    }

    .workspace.focus-middle .drafts-panel,
    .workspace.focus-right .ongoing-panel {
      border-color: rgba(11, 107, 88, 0.42);
      box-shadow: 0 18px 44px rgba(23, 37, 84, 0.15);
      transform: translateY(-1px);
    }

    .workspace.focus-middle .records-panel,
    .workspace.focus-middle .ongoing-panel,
    .workspace.focus-right .records-panel,
    .workspace.focus-right .drafts-panel {
      opacity: 0.94;
    }

    .panel-head {
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
    }

    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .type-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .type-tab {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }

    .type-tab.active {
      border-color: var(--green);
      background: var(--soft-green);
      color: var(--green-2);
    }

    .inline-hint {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #c8dbea;
      border-radius: 7px;
      background: var(--soft-blue);
      color: var(--blue);
      font-size: 12px;
      line-height: 1.45;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      outline: none;
      padding: 8px 9px;
    }

    textarea {
      min-height: 36px;
      height: 36px;
      line-height: 1.35;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(11, 107, 88, 0.58);
      box-shadow: 0 0 0 3px rgba(11, 107, 88, 0.10);
    }

    .btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
      font-weight: 700;
    }

    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .btn.primary:hover { background: var(--green-2); }

    .btn.blue {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn.danger {
      border-color: #efc7c7;
      background: var(--soft-red);
      color: var(--red);
    }

    .btn.ghost { background: var(--panel-2); }

    .icon-btn {
      width: 36px;
      min-width: 36px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .record-list, .draft-list, .ongoing-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .change-pair-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(180px, 0.92fr);
      gap: 10px;
      align-items: start;
    }

    .change-pair-column {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pair-column-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .record-card {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }

    .record-card:hover {
      border-color: rgba(31, 95, 153, 0.55);
      background: #f8fbff;
      box-shadow: 0 8px 18px rgba(31, 95, 153, 0.08);
    }

    .record-card.selected {
      border-color: rgba(11, 107, 88, 0.72);
      background: var(--soft-green);
    }

    .record-card.disabled:not(.completed) {
      opacity: 0.72;
      cursor: pointer;
      background: #f5f7f8;
    }

    .record-card.completed {
      border-color: rgba(11, 107, 88, 0.42);
      background: linear-gradient(180deg, #ffffff 0%, #f0faf6 100%);
    }

    .zhihang-card {
      border: 1px solid rgba(31, 95, 153, 0.22);
      border-radius: 7px;
      background: #fbfdff;
      padding: 9px;
      cursor: pointer;
      transition: border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }

    .zhihang-card:hover {
      border-color: rgba(31, 95, 153, 0.58);
      background: #f3f8ff;
      box-shadow: 0 8px 18px rgba(31, 95, 153, 0.08);
    }

    .zhihang-card.disabled {
      cursor: default;
      opacity: 0.64;
      background: #f5f7f8;
    }

    .zhihang-card.disabled:hover {
      border-color: rgba(31, 95, 153, 0.22);
      box-shadow: none;
    }

    .zhihang-binding {
      border: 1px dashed rgba(31, 95, 153, 0.28);
      border-radius: 7px;
      padding: 10px;
      background: #f8fbff;
    }

    .zhihang-binding .row-actions { margin-top: 6px; }

    @media (max-width: 760px) {
      .change-pair-grid { grid-template-columns: 1fr; }
    }

    .record-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
    }

    .record-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .tag {
      flex: none;
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .tag.green { background: var(--soft-green); color: var(--green-2); }
    .tag.blue { background: var(--soft-blue); color: var(--blue); }
    .tag.amber { background: var(--soft-amber); color: var(--amber); }
    .tag.red { background: var(--soft-red); color: var(--red); }

    .draft-card, .ongoing-card {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 12px;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .ongoing-card.removing {
      opacity: 0;
      transform: translateX(18px);
      pointer-events: none;
    }

    .draft-card.active {
      border-color: rgba(11, 107, 88, 0.5);
      box-shadow: inset 4px 0 0 var(--green);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: none;
    }

    .card-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px 10px;
    }

    .form-grid .wide { grid-column: 1 / -1; }

    .job-line {
      min-height: 28px;
      margin-top: 9px;
      padding: 6px 8px;
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
    }

    .job-line.success { background: var(--soft-green); color: var(--green-2); }
    .job-line.failed { background: var(--soft-red); color: var(--red); }
    .job-line.busy { background: var(--soft-blue); color: var(--blue); }

    .empty {
      padding: 18px 12px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 7px;
      background: var(--panel-2);
    }

    details {
      margin-top: 8px;
    }

    summary {
      cursor: pointer;
      color: var(--blue);
      font-weight: 700;
      margin-bottom: 8px;
    }

    @media (max-width: 1240px) {
      .app { height: auto; min-height: 100vh; }
      .workspace,
      .workspace.focus-left,
      .workspace.focus-middle,
      .workspace.focus-right { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: 1fr; }
      .panel { min-height: 420px; }
      .scope-grid { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
    }

    @media (max-width: 620px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .gate-inner { padding: 22px 16px 18px; }
      .gate-brand {
        min-height: 44px;
        padding: 0 88px;
      }
      .gate-logo {
        top: 14px;
        right: 14px;
        width: 76px;
        max-width: 28%;
      }
      .brand-logo { width: 76px; }
      .workspace { padding: 8px; gap: 8px; }
      .summary-strip { padding: 8px 8px 0; }
      .summary-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form-grid { grid-template-columns: 1fr; }
      .scope-grid { grid-template-columns: 1fr; }
      .feature-grid { grid-template-columns: 1fr; }
      .link-settings { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section id="gate" class="gate">
    <div class="gate-inner">
      <div class="gate-brand">
        <img class="gate-logo" src="/assets/vnet-logo.png" alt="世纪互联 VNET" />
        <h1 id="gateTitle">南通基地-运维灯塔工作台</h1>
      </div>
      <p id="gateDesc">选择需要进入的功能。</p>
      <div id="authPanel" class="auth-panel hidden"></div>
      <div id="featureGrid" class="feature-grid"></div>
      <div id="scopeGrid" class="scope-grid hidden"></div>
      <div id="handoverSettings" class="settings-panel hidden"></div>
      <div id="gateActions" class="gate-actions"></div>
    </div>
  </section>

  <main id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="/assets/vnet-logo.png" alt="世纪互联 VNET" />
        <h1>南通基地-运维灯塔工作台</h1>
        <span id="scopeLabel" class="scope">全部</span>
        <div class="sync-status">
          <span id="syncTime" class="pill">数据未加载</span>
          <span id="syncWarning" class="pill warning hidden"></span>
        </div>
      </div>
      <div class="statusbar">
        <span id="userPill" class="pill hidden"></span>
        <span id="recordCount" class="pill">待发起 0</span>
        <span id="ongoingCount" class="pill">进行中 0</span>
        <span id="autoRefreshPill" class="pill hidden">自动刷新已关闭</span>
        <button id="refreshBtn" class="btn ghost">刷新本页</button>
        <button id="syncSourceBtn" class="btn ghost">同步源表</button>
        <button id="switchScopeBtn" class="btn ghost">切换楼栋</button>
        <button id="homeBtn" class="btn ghost">功能选择</button>
        <button id="logoutBtn" class="btn ghost hidden">退出登录</button>
      </div>
    </header>

    <section class="summary-strip">
      <div class="summary-card">
        <div class="record-title">
          <span>当日工作通告汇总</span>
          <span id="summaryDate" class="tag green">今日</span>
        </div>
        <div id="summaryMetrics" class="summary-metrics" style="margin-top:8px"></div>
      </div>
      <div class="summary-card">
        <div class="record-title">
          <span>今日闭环记录</span>
          <span id="summaryHint" class="tag blue">点击查看详情</span>
        </div>
        <div id="summaryTimeline" class="timeline" style="margin-top:8px"></div>
      </div>
    </section>

    <section id="workspace" class="workspace">
      <aside class="panel work-panel records-panel" data-workspace-zone="left">
        <div class="panel-head">
          <h2>待发起事项</h2>
          <div class="row-actions">
            <button id="addManualDraftBtn" class="btn blue">纯手填</button>
            <button id="clearSelectionBtn" class="btn ghost">清空</button>
          </div>
        </div>
        <div class="panel-body">
          <div class="filters">
            <div>
              <label>通告类型</label>
              <div id="workTypeTabs" class="type-tabs"></div>
              <div id="workTypeHint" class="inline-hint hidden"></div>
            </div>
            <div>
              <label for="monthSelect">计划维护月份</label>
              <select id="monthSelect"></select>
            </div>
            <div>
              <label for="specialtySelect">专业类别</label>
              <select id="specialtySelect"></select>
            </div>
            <div>
              <label for="searchInput">事项搜索</label>
              <input id="searchInput" type="search" placeholder="输入名称、编号、变更简述或维修名称" />
            </div>
          </div>
          <div id="recordList" class="record-list"></div>
        </div>
      </aside>

      <section class="panel work-panel drafts-panel" data-workspace-zone="middle">
        <div class="panel-head">
          <h2>待发起通告</h2>
          <button id="sendAllStartBtn" class="btn primary">一键发送全部开始通报并上传</button>
        </div>
        <div class="panel-body">
          <div id="draftList" class="draft-list"></div>
        </div>
      </section>

      <aside class="panel work-panel ongoing-panel" data-workspace-zone="right">
        <div class="panel-head">
          <h2>已开始未结束</h2>
          <button id="refreshOngoingBtn" class="btn ghost">刷新进行中</button>
        </div>
        <div class="panel-body">
          <div id="ongoingList" class="ongoing-list"></div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    function normalizeScopeValue(value, fallback = "") {
      const text = String(value || "").trim().toUpperCase();
      if (!text) return fallback;
      if (["ALL", "全部"].includes(text)) return "ALL";
      if (["CAMPUS", "PARK", "园区"].includes(text)) return "CAMPUS";
      if (text.includes("110")) return "110";
      const match = text.match(/[ABCDEH]/);
      return match ? match[0] : fallback;
    }

    function stripTransientUrlParams(url) {
      url.searchParams.delete("code");
      url.searchParams.delete("state");
      return url;
    }

    function redirectRootOAuthCallback() {
      const url = new URL(window.location.href);
      const code = url.searchParams.get("code") || "";
      const stateValue = url.searchParams.get("state") || "";
      if (url.pathname !== "/" || !code || !stateValue) return false;
      const callback = new URL("/api/auth/feishu/callback", url.origin);
      callback.searchParams.set("code", code);
      callback.searchParams.set("state", stateValue);
      window.location.replace(callback.toString());
      return true;
    }

    const oauthRedirecting = redirectRootOAuthCallback();
    const urlScope = () => normalizeScopeValue(new URLSearchParams(window.location.search).get("scope") || "", "");
    const urlMode = () => new URLSearchParams(window.location.search).get("mode") || "";
    const state = {
      scope: urlScope(),
      gateMode: urlMode() || (urlScope() ? "maintenance" : "home"),
      scopeOptions: [
        { value: "110", label: "110站" },
        { value: "A", label: "A楼" },
        { value: "B", label: "B楼" },
        { value: "C", label: "C楼" },
        { value: "D", label: "D楼" },
        { value: "E", label: "E楼" },
        { value: "H", label: "H楼" },
        { value: "CAMPUS", label: "园区" },
        { value: "ALL", label: "全部" },
      ],
      auth: {
        loaded: false,
        configured: true,
        loggedIn: false,
        user: null,
        allowedScopes: [],
        scopeOptions: [],
        defaultScope: "",
        loginUrl: "/api/auth/login",
        redirectUri: "",
        error: "",
      },
      records: [],
      zhihangRecords: [],
      ongoing: [],
      dailySummary: { date: "", items: [], stats: {} },
      handover: {
        scopeOptions: [],
        links: {},
        updatedAt: "",
        settingsPassword: "",
        authOpen: false,
        resetId: "",
        resetMessage: "",
      },
      handoverSettingsOpen: false,
      scopeOverview: {},
      lastLoadedAt: "",
      warnings: [],
      filters: { month: "", specialty: "", search: "" },
      workType: "maintenance",
      defaults: { impact: "对IT业务无影响，不会触发BA和BMS系统相关告警", progress: "准备工作已完成，人员已就位，可否开始操作？" },
      selected: new Set(),
      drafts: new Map(),
      jobStates: new Map(),
      actionOps: new Map(),
      jobToOpKey: new Map(),
      polling: new Set(),
      activeDraftKey: "",
      autoRefresh: {
        timerId: 0,
        intervalMs: 3 * 60 * 1000,
        inFlight: false,
        lastAutoAt: "",
      },
      expandedRecordId: "",
      expandedSummaryKey: "",
    };

    const WORK_TYPES = [
      { value: "maintenance", label: "维保" },
      { value: "change", label: "变更" },
      { value: "repair", label: "检修" },
    ];
    const WORK_TYPE_VALUES = WORK_TYPES.map((item) => item.value);
    const MANUAL_DRAFT_PREFIX = "manual:";
    const MAINTENANCE_CYCLE_OPTIONS = [
      "每月",
      "每季",
      "每年",
      "半年",
      "每两年",
      "每三年",
      "每五年",
      "冬季保温每日",
    ];
    const JOB_STATE_TTL_MS = 24 * 60 * 60 * 1000;
    const JOB_STATE_LIMIT = 80;
    const AUTO_REFRESH_DEFAULT_MS = 60 * 1000;
    const AUTO_REFRESH_MIN_MS = 60 * 1000;
    const AUTO_REFRESH_MAX_MS = 10 * 60 * 1000;

    const $ = (id) => document.getElementById(id);
    const pad = (n) => String(n).padStart(2, "0");
    const todayInput = (h, m) => {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(h)}:${pad(m)}`;
    };
    const dt = (value) => String(value || "").replace("T", " ");
    const opId = () => `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    const datePart = (value) => {
      const match = String(value || "").match(/\d{4}-\d{1,2}-\d{1,2}/);
      return match ? match[0] : "";
    };
    const dayLabel = (value) => {
      const day = datePart(value);
      if (!day) return "";
      const today = datePart(state.dailySummary?.date || "");
      return day === today ? "今日" : day.slice(5);
    };
    const opFor = (key) => {
      if (!state.actionOps.has(key)) state.actionOps.set(key, opId());
      return state.actionOps.get(key);
    };
    const scopeLabel = (value) => {
      const normalized = normalizeScopeValue(value, "ALL");
      return (
        state.scopeOptions.find((x) => normalizeScopeValue(x.value, "") === normalized)
        || state.auth.scopeOptions.find((x) => normalizeScopeValue(x.value, "") === normalized)
        || {}
      ).label || (normalized === "CAMPUS" ? "园区" : normalized === "ALL" ? "全部" : normalized === "110" ? "110站" : `${normalized}楼`);
    };
    const workTypeLabel = (value) => (WORK_TYPES.find((item) => item.value === value) || WORK_TYPES[0]).label;
    const isManualDraftKey = (key) => String(key || "").startsWith(MANUAL_DRAFT_PREFIX);
    const manualDraftKey = (type) => `${MANUAL_DRAFT_PREFIX}${type || "maintenance"}:${opId()}`;
    const recordKey = (record) => record?.manual_key || `${record.work_type || "maintenance"}:${record.record_id}`;
    const storageKey = () => `lan-workbench:${state.scope || "ALL"}`;
    const jobStorageKey = () => `lan-workbench-jobs:${state.scope || "ALL"}`;
    const safeJsonParse = (value, fallback) => {
      try { return JSON.parse(value); } catch { return fallback; }
    };

    function loadDraftState() {
      const saved = safeJsonParse(localStorage.getItem(storageKey()) || "{}", {});
      state.selected = new Set(Array.isArray(saved.selected) ? saved.selected : []);
      state.drafts = new Map(Object.entries(saved.drafts || {}));
    }

    function saveDraftState() {
      const drafts = {};
      for (const [key, value] of state.drafts.entries()) drafts[key] = value;
      localStorage.setItem(storageKey(), JSON.stringify({
        selected: Array.from(state.selected),
        drafts,
      }));
    }

    function loadJobState() {
      const saved = safeJsonParse(localStorage.getItem(jobStorageKey()) || "{}", {});
      const now = Date.now();
      const entries = Object.entries(saved.jobs || {})
        .filter(([, value]) => {
          const updatedAt = Date.parse(value?.updated_at || "");
          return Number.isFinite(updatedAt) && now - updatedAt <= JOB_STATE_TTL_MS;
        })
        .sort((a, b) => {
          const left = Date.parse(a[1]?.updated_at || "");
          const right = Date.parse(b[1]?.updated_at || "");
          return (Number.isFinite(right) ? right : 0) - (Number.isFinite(left) ? left : 0);
        })
        .slice(0, JOB_STATE_LIMIT);
      state.jobStates = new Map(entries);
      saveJobState();
    }

    function saveJobState() {
      const jobs = {};
      const entries = Array.from(state.jobStates.entries())
        .sort((a, b) => {
          const left = Date.parse(a[1]?.updated_at || "");
          const right = Date.parse(b[1]?.updated_at || "");
          return (Number.isFinite(right) ? right : 0) - (Number.isFinite(left) ? left : 0);
        })
        .slice(0, JOB_STATE_LIMIT);
      state.jobStates = new Map(entries);
      for (const [key, value] of entries) jobs[key] = value;
      localStorage.setItem(jobStorageKey(), JSON.stringify({ jobs }));
    }

    function jobLocalKey(payload, lineKey) {
      const workType = payload?.work_type || "maintenance";
      const action = payload?.action || "";
      const source = payload?.source_record_id || payload?.record_id || payload?.active_item_id || lineKey || "";
      return [state.scope || "ALL", workType, action, source].join(":");
    }

    function rememberJobState(localKey, patch) {
      const existing = state.jobStates.get(localKey) || {};
      state.jobStates.set(localKey, { ...existing, ...patch, updated_at: new Date().toISOString() });
      saveJobState();
    }

    function forgetJobState(localKey) {
      if (!localKey) return;
      state.jobStates.delete(localKey);
      saveJobState();
    }

    function forgetJobsForLine(lineKey) {
      for (const [key, value] of Array.from(state.jobStates.entries())) {
        if (value.line_key === lineKey) state.jobStates.delete(key);
      }
      saveJobState();
    }

    function cleanupDraftState() {
      const recordsByKey = new Map(state.records.map((record) => [recordKey(record), record]));
      const isUnavailable = (key) => {
        if (isManualDraftKey(key)) return !state.drafts.has(key);
        const record = recordsByKey.get(key);
        if (!record) return true;
        return isRecordUnavailableForSelection(record);
      };
      for (const key of Array.from(state.selected)) {
        if (isUnavailable(key)) state.selected.delete(key);
      }
      for (const key of Array.from(state.drafts.keys())) {
        if (isUnavailable(key)) state.drafts.delete(key);
      }
      if (state.activeDraftKey && !state.selected.has(state.activeDraftKey)) {
        state.activeDraftKey = "";
      }
      saveDraftState();
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        credentials: "same-origin",
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const payload = await res.json().catch(() => ({}));
      if (res.status === 401) {
        state.auth.loggedIn = false;
        state.auth.user = null;
        state.auth.allowedScopes = [];
        state.auth.scopeOptions = [];
        state.scopeOptions = [];
        $("app").classList.add("hidden");
        $("gate").classList.remove("hidden");
        renderGate();
      }
      if (!res.ok || !payload.ok) throw new Error(payload.error || `请求失败 ${res.status}`);
      return payload.data;
    }

    function authNextPath() {
      const url = stripTransientUrlParams(new URL(window.location.href));
      if (url.pathname.startsWith("/api/auth/")) return "/";
      return `${url.pathname}${url.search || ""}`;
    }

    function hasPortalAccess() {
      return Boolean(state.auth.loggedIn && (state.auth.scopeOptions || []).length);
    }

    async function loadAuthStatus() {
      try {
        const data = await api(`/api/auth/status?next=${encodeURIComponent(authNextPath())}`);
        state.auth = {
          ...state.auth,
          loaded: true,
          configured: Boolean(data.configured),
          loggedIn: Boolean(data.logged_in),
          user: data.user || null,
          allowedScopes: data.allowed_scopes || [],
          scopeOptions: data.scope_options || [],
          defaultScope: data.default_scope || "",
          loginUrl: data.login_url || "/api/auth/login",
          redirectUri: data.redirect_uri || "",
          error: "",
        };
        if (state.auth.scopeOptions.length) state.scopeOptions = state.auth.scopeOptions;
      } catch (err) {
        state.auth = {
          ...state.auth,
          loaded: true,
          loggedIn: false,
          user: null,
          allowedScopes: [],
          scopeOptions: [],
          error: err.message || "登录状态读取失败",
        };
      }
      updateUserChrome();
      return state.auth;
    }

    function updateAuthFromPayload(data) {
      if (!data || !data.auth) return;
      state.auth = {
        ...state.auth,
        loaded: true,
        configured: Boolean(data.auth.configured),
        loggedIn: Boolean(data.auth.logged_in),
        user: data.auth.user || null,
        allowedScopes: data.auth.allowed_scopes || [],
        scopeOptions: data.auth.scope_options || state.auth.scopeOptions || [],
        defaultScope: data.auth.default_scope || state.auth.defaultScope || "",
        loginUrl: data.auth.login_url || state.auth.loginUrl || "/api/auth/login",
        redirectUri: data.auth.redirect_uri || state.auth.redirectUri || "",
        error: "",
      };
      if (state.auth.scopeOptions.length) state.scopeOptions = state.auth.scopeOptions;
      updateUserChrome();
    }

    function updateUserChrome() {
      const user = state.auth.user || {};
      const label = state.auth.loggedIn
        ? `${user.name || "飞书用户"} · ${user.role === "admin" ? "全权限" : "楼栋权限"}`
        : "";
      $("userPill").textContent = label;
      $("userPill").classList.toggle("hidden", !label);
      $("logoutBtn").classList.toggle("hidden", !state.auth.loggedIn);
    }

    function scopeAllowed(scope) {
      const normalized = normalizeScopeValue(scope, "");
      return (state.scopeOptions || []).some((item) => normalizeScopeValue(item.value, "") === normalized);
    }

    function setSyncStatus(text, warnings = state.warnings) {
      $("syncTime").textContent = text || "数据未加载";
      const warning = (warnings || []).filter(Boolean)[0] || "";
      $("syncWarning").textContent = warning;
      $("syncWarning").classList.toggle("hidden", !warning);
    }

    function formatRefreshInterval(ms) {
      const minutes = Math.max(1, Math.round(Number(ms || 0) / 60000));
      return `${minutes}分钟`;
    }

    function updateAutoRefreshInterval(data) {
      const ttlSeconds = Number(data?.source_cache_ttl_seconds || 0);
      const fromCacheTtl = Number.isFinite(ttlSeconds) && ttlSeconds > 0
        ? ttlSeconds * 1000
        : AUTO_REFRESH_DEFAULT_MS;
      const preferredMs = Math.min(fromCacheTtl, AUTO_REFRESH_DEFAULT_MS);
      state.autoRefresh.intervalMs = Math.max(
        AUTO_REFRESH_MIN_MS,
        Math.min(AUTO_REFRESH_MAX_MS, preferredMs)
      );
      updateAutoRefreshPill();
    }

    function updateAutoRefreshPill() {
      const active = Boolean(
        state.auth.loggedIn
        && state.scope
        && !$("app").classList.contains("hidden")
      );
      const pill = $("autoRefreshPill");
      pill.classList.toggle("hidden", !active);
      if (!active) return;
      const suffix = state.autoRefresh.lastAutoAt
        ? `，上次 ${state.autoRefresh.lastAutoAt}`
        : "";
      pill.textContent = `自动刷新 ${formatRefreshInterval(state.autoRefresh.intervalMs)}${suffix}`;
    }

    function stopAutoRefresh() {
      if (state.autoRefresh.timerId) {
        clearTimeout(state.autoRefresh.timerId);
        state.autoRefresh.timerId = 0;
      }
      updateAutoRefreshPill();
    }

    function startAutoRefresh() {
      stopAutoRefresh();
      if (!state.auth.loggedIn || !state.scope || $("app").classList.contains("hidden")) return;
      state.autoRefresh.timerId = window.setTimeout(runAutoRefresh, state.autoRefresh.intervalMs);
      updateAutoRefreshPill();
    }

    async function runAutoRefresh() {
      if (state.autoRefresh.timerId) clearTimeout(state.autoRefresh.timerId);
      state.autoRefresh.timerId = 0;
      if (!state.auth.loggedIn || !state.scope || $("app").classList.contains("hidden")) {
        updateAutoRefreshPill();
        return;
      }
      if (document.visibilityState === "hidden" || state.autoRefresh.inFlight) {
        startAutoRefresh();
        return;
      }
      state.autoRefresh.inFlight = true;
      try {
        await refreshWorkbench({ automatic: true });
        state.autoRefresh.lastAutoAt = new Date().toLocaleTimeString("zh-CN", {
          hour: "2-digit",
          minute: "2-digit",
        });
      } catch (err) {
        setSyncStatus(`自动刷新失败: ${err.message || "未知错误"}`, state.warnings);
      } finally {
        state.autoRefresh.inFlight = false;
        startAutoRefresh();
      }
    }

    function recordTypeCounts() {
      const initial = Object.fromEntries(WORK_TYPES.map((item) => [item.value, 0]));
      return state.records.reduce((counts, record) => {
        const type = record.work_type || "maintenance";
        if (Object.prototype.hasOwnProperty.call(counts, type)) counts[type] += 1;
        return counts;
      }, initial);
    }

    function ongoingTypeCounts() {
      const initial = Object.fromEntries(WORK_TYPES.map((item) => [item.value, 0]));
      return state.ongoing.reduce((counts, item) => {
        const type = item.work_type || "maintenance";
        if (Object.prototype.hasOwnProperty.call(counts, type)) counts[type] += 1;
        return counts;
      }, initial);
    }

    function splitTimeRange(text, fallbackStart = "", fallbackEnd = "") {
      const raw = String(text || "");
      const parts = raw.split(/~|至|到/).map((x) => x.trim()).filter(Boolean);
      return {
        start: String(fallbackStart || parts[0] || "").trim(),
        end: String(fallbackEnd || parts[1] || "").trim(),
      };
    }

    function html(text) {
      return String(text ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[ch]));
    }

    function fieldsOf(record) {
      return record.display_fields || {};
    }

    function sourceProgressForRecord(record) {
      if (record?.manual) return "未开始";
      const f = fieldsOf(record);
      const type = record.work_type || "maintenance";
      if (record.source_progress || record.source_status) return record.source_progress || record.source_status;
      if (type === "change") return f["变更进度"] || "";
      if (type === "repair") return firstRepairField(record, ["维修开始时间"]) ? "进行中" : "未开始";
      return f["维护实施状态"] || "";
    }

    function sourceActionForRecord(record) {
      return sourceProgressForRecord(record) === "未开始" ? "start" : "update";
    }

    function sourceActionLabel(record) {
      return sourceActionForRecord(record) === "start" ? "开始" : "更新";
    }

    function targetRecordIdForRecord(record) {
      const summary = record?.work_summary || {};
      return String(
        summary.target_record_id
        || summary.feishu_record_id
        || summary.record_id
        || record?.target_record_id
        || ""
      ).trim();
    }

    function isSourceOngoingRecord(record) {
      return sourceActionForRecord(record) === "update";
    }

    function isRecordUnavailableForSelection(record) {
      const summary = record?.work_summary || {};
      if (summary.status === "已结束") return true;
      if (isRecordOngoing(record)) return true;
      return Boolean(summary.started_at) && !isSourceOngoingRecord(record);
    }

    function repairTitleForRecord(record) {
      const f = fieldsOf(record);
      return firstRepairField(record, ["事件描述"]) || f["维修名称"] || record.record_id;
    }

    function titleForRecord(record) {
      if (record?.manual) {
        return fieldsOf(record)["手动标题"] || `手动${workTypeLabel(record.work_type)}通告`;
      }
      const f = fieldsOf(record);
      const type = record.work_type || "maintenance";
      if (type === "change") return f["变更简述"] || record.record_id;
      if (type === "repair") return repairTitleForRecord(record);
      return `EA118机房${f["楼栋"] || ""}${f["维护总项"] || ""}`;
    }

    function recordCardTitle(record) {
      const title = titleForRecord(record);
      if ((record.work_type || "maintenance") !== "maintenance") return title;
      const period = String(fieldsOf(record)["维护周期"] || "").trim();
      return period ? `${title}-${period}` : title;
    }

    function zhihangTitle(record) {
      return record?.title || record?.display_fields?.["标题"] || record?.record_id || "";
    }

    function zhihangMetaText(record) {
      const fields = record?.display_fields || {};
      return [
        record?.scope_label ? `范围 ${record.scope_label}` : "",
        record?.progress ? `进度 ${record.progress}` : "",
        record?.level ? `等级 ${record.level}` : "",
        record?.change_type ? `类型 ${record.change_type}` : "",
        record?.plan_start || fields["计划开始"] ? `计划 ${record.plan_start || fields["计划开始"]}` : "",
        record?.plan_end || fields["计划结束"] ? `结束 ${record.plan_end || fields["计划结束"]}` : "",
        record?.record_id ? `源ID ${record.record_id}` : "",
      ].filter(Boolean).join(" | ");
    }

    function findZhihangRecord(recordId) {
      recordId = String(recordId || "");
      return state.zhihangRecords.find((item) => String(item.record_id || "") === recordId) || null;
    }

    function specialtyForRecord(record) {
      const f = fieldsOf(record);
      if (record?.manual) return f["专业类别"] || f["专业"] || f["所属专业"] || "";
      const type = record.work_type || "maintenance";
      if (type === "change") return f["专业"] || "";
      if (type === "repair") return f["所属专业"] || f["专业（推送消息用）"] || "";
      return f["专业类别"] || "";
    }

    function buildingForRecord(record) {
      const f = fieldsOf(record);
      if (record?.manual) return f["楼栋"] || f["变更楼栋"] || f["所属数据中心/楼栋-使用"] || "";
      const type = record.work_type || "maintenance";
      if (type === "change") return f["变更楼栋"] || "";
      if (type === "repair") return f["所属数据中心/楼栋-使用"] || f["所属数据中心/楼栋（关联CMDB唯一ID关联,DE不选）"] || "";
      return f["楼栋"] || "";
    }

    function levelForRecord(record) {
      const f = fieldsOf(record);
      if ((record.work_type || "maintenance") === "repair") {
        return repairLevelFromEventLevel(firstRepairField(record, ["对应事件等级"]));
      }
      return f["变更等级（阿里）"] || "";
    }

    function firstRepairField(record, names) {
      const f = fieldsOf(record);
      for (const name of names) {
        const value = String(f[name] || "").trim();
        if (value && !["-", "--", "—", "——", "/", "无", "暂无"].includes(value)) return value;
      }
      return "";
    }

    function repairLevelFromEventLevel(value) {
      const text = String(value || "").trim().toUpperCase();
      if (/(^|[^A-Z0-9])I3([^A-Z0-9]|$)/.test(text) || text === "低") return "低";
      if (/(^|[^A-Z0-9])I2([^A-Z0-9]|$)/.test(text) || text === "中") return "中";
      return "";
    }

    function repairDeviceText(record) {
      const f = fieldsOf(record);
      const deviceNo = String(f["设备编号"] || "").trim();
      const deviceName = String(f["设备名称"] || "").trim();
      if (deviceNo && deviceName) return `${deviceNo}${deviceName}`;
      if (deviceNo || deviceName) return deviceNo || deviceName;
      return firstRepairField(record, ["维修设备", "资产名称", "设备"]);
    }

    function isRecordOngoing(record) {
      const title = titleForRecord(record).replace(/\s+/g, "");
      const sourceId = record.source_record_id || record.record_id;
      return state.ongoing.some((item) => {
        if ((item.work_type || "maintenance") !== (record.work_type || "maintenance")) return false;
        if (sourceId && item.source_record_id && item.source_record_id === sourceId) return true;
        return String(item.title || "").replace(/\s+/g, "") === title;
      });
    }

    function repairDraftDefaults(record) {
      return {
        start_time: todayInput(23, 50),
        end_time: toDatetimeLocal(firstRepairField(record, ["故障发生时间", "发现故障时间"])) || "",
        location: "",
        content: titleForRecord(record),
        level: levelForRecord(record),
        specialty: specialtyForRecord(record),
        reason: firstRepairField(record, ["故障原因", "故障维修原因"]),
        impact: "",
        progress: "",
        repair_device: repairDeviceText(record),
        repair_fault: firstRepairField(record, ["维修故障", "故障维修原因"]),
        fault_type: firstRepairField(record, ["故障类型"]) || "设备故障",
        repair_mode: firstRepairField(record, ["维修方式", "维修方", "供应商名称"]),
        discovery: firstRepairField(record, ["对应来源"]),
        symptom: firstRepairField(record, ["故障发生现象描述", "故障现象"]),
        solution: firstRepairField(record, ["解决方案", "维修方案", "后续整改措施"]),
        job_id: "",
      };
    }

    function normalizeRepairDraft(record, draft) {
      const defaults = repairDraftDefaults(record);
      for (const [key, value] of Object.entries(defaults)) {
        if (draft[key] === undefined || draft[key] === null) draft[key] = value;
      }
      if (draft.location && [buildingForRecord(record), repairDeviceText(record)].filter(Boolean).join(" ") === draft.location) {
        draft.location = "";
      }
      if (draft.progress === state.defaults.progress) draft.progress = "";
      const f = fieldsOf(record);
      const sourceTitle = titleForRecord(record);
      if (!draft.content || (f["维修名称"] && draft.content === f["维修名称"])) {
        draft.content = sourceTitle;
      }
      const sourceLevel = levelForRecord(record);
      const rawEventLevel = firstRepairField(record, ["对应事件等级"]).toUpperCase();
      if (!draft.level || draft.level.toUpperCase() === rawEventLevel || ["I2", "I3"].includes(draft.level.toUpperCase())) {
        draft.level = sourceLevel;
      }
      const sourceDiscovery = firstRepairField(record, ["对应来源"]);
      if (!draft.discovery || draft.discovery === f["故障发现方式"] || draft.discovery === f["发现方式"]) {
        draft.discovery = sourceDiscovery;
      }
      return draft;
    }

    function manualDraftDefaults(type) {
      return {
        manual: true,
        work_type: WORK_TYPE_VALUES.includes(type) ? type : "maintenance",
        title: "",
        building: "",
        specialty: "",
        level: "",
        maintenance_cycle: "",
        start_time: "",
        end_time: "",
        location: "",
        content: "",
        reason: "",
        impact: "",
        progress: "",
        zhihang_involved: false,
        zhihang_record_id: "",
        zhihang_title: "",
        zhihang_progress: "",
        repair_device: "",
        repair_fault: "",
        fault_type: "",
        repair_mode: "",
        discovery: "",
        symptom: "",
        solution: "",
        job_id: "",
      };
    }

    function manualRecordFromDraft(key, draft) {
      const type = WORK_TYPE_VALUES.includes(draft?.work_type) ? draft.work_type : "maintenance";
      const title = String(draft?.title || draft?.content || "").trim();
      const building = String(draft?.building || "").trim();
      const specialty = String(draft?.specialty || "").trim();
      return {
        manual: true,
        manual_key: key,
        record_id: key,
        work_type: type,
        notice_type: type === "change" ? "设备变更" : type === "repair" ? "设备检修" : "维保通告",
        building_codes: [],
        display_fields: {
          "手动标题": title,
          "楼栋": building,
          "变更楼栋": building,
          "所属数据中心/楼栋-使用": building,
          "专业类别": specialty,
          "专业": specialty,
          "所属专业": specialty,
          "维护周期": draft?.maintenance_cycle || "",
        },
      };
    }

    function draftRecordForKey(key) {
      const record = state.records.find((item) => recordKey(item) === key);
      if (record) return record;
      const draft = state.drafts.get(key);
      if (isManualDraftKey(key) && draft) return manualRecordFromDraft(key, draft);
      return null;
    }

    function addManualDraft() {
      const type = WORK_TYPE_VALUES.includes(state.workType) ? state.workType : "maintenance";
      const key = manualDraftKey(type);
      state.drafts.set(key, manualDraftDefaults(type));
      state.selected.add(key);
      state.activeDraftKey = key;
      saveDraftState();
      render();
    }

    function getDraft(record) {
      const id = recordKey(record);
      if (record.manual) {
        if (!state.drafts.has(id)) {
          state.drafts.set(id, manualDraftDefaults(record.work_type));
          saveDraftState();
        }
        return state.drafts.get(id);
      }
      if (!state.drafts.has(id)) {
        const memory = record.memory || {};
        const f = fieldsOf(record);
        const type = record.work_type || "maintenance";
        const isChange = type === "change";
        const isRepair = type === "repair";
        const draft = isRepair ? repairDraftDefaults(record) : {
          start_time: isChange
            ? (toDatetimeLocal(f["变更开始日期（阿里）"]) || todayInput(9, 30))
            : todayInput(9, 30),
          end_time: isChange
            ? (toDatetimeLocal(f["变更结束日期（阿里）"]) || todayInput(18, 30))
            : todayInput(18, 30),
          location: memory.location || "",
          content: isChange ? titleForRecord(record) : (memory.content || ""),
          reason: memory.reason || "",
          impact: memory.impact || state.defaults.impact,
          progress: state.defaults.progress,
          zhihang_involved: false,
          zhihang_record_id: "",
          zhihang_title: "",
          zhihang_progress: "",
          job_id: "",
        };
        state.drafts.set(id, draft);
        saveDraftState();
      }
      const draft = state.drafts.get(id);
      if ((record.work_type || "maintenance") === "repair") {
        normalizeRepairDraft(record, draft);
      }
      return draft;
    }

    function setJobLine(key, text, status = "") {
      const el = document.querySelector(`[data-job-line="${CSS.escape(key)}"]`);
      if (!el) return;
      el.className = `job-line ${status}`;
      el.textContent = text || "";

    function renderMaintenanceGate() {
      $("gateTitle").textContent = "维保变更检修相关";
      $("gateDesc").textContent = "选择楼栋或园区后进入对应工作台，页面内展示该范围的待发起和进行中通告。";
      $("authPanel").classList.add("hidden");
      $("featureGrid").classList.add("hidden");
      $("scopeGrid").classList.remove("hidden");

      $("authPanel").classList.add("hidden");
      $("featureGrid").classList.add("hidden");
      $("scopeGrid").classList.remove("hidden");

          <button class="scope-btn" data-handover-scope="${html(itemScope)}">

        <button class="btn ghost" data-back-home>返回功能选择</button>

          state.handover.resetId = "";

      panel.classList.toggle("hidden", !visible);
      if (!visible) {
        panel.innerHTML = "";

      }

        panel.innerHTML = `
          <div class="record-title">
            <span>交接班链接设置验证</span>
            <span class="tag amber">需要密码</span>
          </div>
          <div class="form-grid" style="margin-top:10px">

              <label for="handoverSettingsPassword">设置密码</label>
              <input id="handoverSettingsPassword" type="password" autocomplete="current-password" />
            </div>
            <div>
              <label>&nbsp;</label>
              <button class="btn primary" data-auth-handover-settings>进入设置</button>
            </div>
          </div>
          <div class="row-actions" style="margin-top:10px">
            <button class="btn ghost" data-request-handover-reset>忘记密码</button>
            <button class="btn ghost" data-cancel-handover-auth>取消</button>
          </div>

            <div class="work-detail">
              ${html(state.handover.resetMessage || "验证码已发送，请输入验证码和新密码。")}
              <div class="form-grid" style="margin-top:10px">
                <div>
                  <label for="handoverResetCode">验证码</label>
                  <input id="handoverResetCode" inputmode="numeric" autocomplete="one-time-code" />

      document.querySelector("[data-close-handover-settings]")?.addEventListener("click", () => {

        state.handover.authOpen = false;
        renderGate();

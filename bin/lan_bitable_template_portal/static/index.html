    async function authenticateHandoverSettings() {
      const password = $("handoverSettingsPassword")?.value || "";
      const line = $("handoverAuthLine");
      if (line) {
        line.className = "job-line busy";
        line.textContent = "正在验证密码";
      }
      try {
        await api("/api/handover-links-auth", {
          method: "POST",
          body: JSON.stringify({ password }),
        });
        state.handover.settingsPassword = password;
        state.handoverSettingsOpen = true;
        state.handover.authOpen = false;
        state.handover.resetId = "";
        state.handover.resetMessage = "";
        renderGate();
      } catch (err) {
        state.handoverSettingsOpen = false;
        state.handover.settingsPassword = "";
        if (line) {
          line.className = "job-line failed";
          line.textContent = err.message || "密码错误";
        }
      }
    }

    async function requestHandoverPasswordReset() {
      const line = $("handoverAuthLine");
      if (line) {
        line.className = "job-line busy";
        line.textContent = "正在发送验证码";
      }
      try {
        const data = await api("/api/handover-password-reset/request", {
          method: "POST",
          body: JSON.stringify({}),
        });
        state.handover.resetId = data.reset_id || "";
        state.handover.resetMessage = `验证码已发送给 ${data.recipients_count || 0} 位管理员，有效期至 ${data.expires_at || "-"}`;
        state.handover.authOpen = true;
        renderGate();
      } catch (err) {
        if (line) {
          line.className = "job-line failed";
          line.textContent = err.message || "验证码发送失败";
        }
      }
    }

    async function confirmHandoverPasswordReset() {
      const code = $("handoverResetCode")?.value || "";
      const newPassword = $("handoverNewPassword")?.value || "";
      const line = $("handoverAuthLine");
      if (line) {
        line.className = "job-line busy";
        line.textContent = "正在修改密码";
      }
      try {
        await api("/api/handover-password-reset/confirm", {
          method: "POST",
          body: JSON.stringify({
            reset_id: state.handover.resetId,
            code,
            new_password: newPassword,
          }),
        });
        state.handover.settingsPassword = newPassword;
        state.handoverSettingsOpen = true;
        state.handover.authOpen = false;
        state.handover.resetId = "";
        state.handover.resetMessage = "";
        renderGate();
      } catch (err) {
        if (line) {
          line.className = "job-line failed";
          line.textContent = err.message || "修改密码失败";
        }
      }
    }

    function showGate(mode, { replace = false } = {}) {
      stopAutoRefresh();
      state.gateMode = ["maintenance", "handover"].includes(mode) ? mode : "home";
      state.scope = "";
      const url = stripTransientUrlParams(new URL(window.location.href));
      url.searchParams.delete("scope");
      if (state.gateMode === "home") url.searchParams.delete("mode");
      else url.searchParams.set("mode", state.gateMode);
      if (replace) window.history.replaceState({ mode: state.gateMode }, "", url);
      else window.history.pushState({ mode: state.gateMode }, "", url);
      $("app").classList.add("hidden");
      $("gate").classList.remove("hidden");
      renderGate();
      if (state.gateMode === "maintenance") loadScopeOverview();
      if (state.gateMode === "handover") loadHandoverLinks();
    }

    async function logout() {
      stopAutoRefresh();
      try {
        await fetch("/api/auth/logout", {
          method: "POST",
          credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: "{}",
        });
      } catch {}
      state.auth = {
        ...state.auth,
        loaded: true,
        loggedIn: false,
        user: null,
        allowedScopes: [],
        scopeOptions: [],
      };
      state.scope = "";
      state.records = [];
      state.ongoing = [];
      state.selected.clear();
      state.drafts.clear();
      state.scopeOptions = [];
      updateUserChrome();
      const url = new URL(window.location.href);
      stripTransientUrlParams(url);
      url.searchParams.delete("scope");
      url.searchParams.delete("mode");
      window.history.replaceState({}, "", url);
      $("app").classList.add("hidden");
      $("gate").classList.remove("hidden");
      renderGate();
    }

    function scopeMetricHtml(scope) {
      const item = state.scopeOverview[scope] || {};
      const maintenance = item.maintenance_pending ?? "-";
      const change = item.change_pending ?? "-";
      const repair = item.repair_pending ?? "-";
      const ongoing = (
        Number(item.maintenance_ongoing || 0)
        + Number(item.change_ongoing || 0)
        + Number(item.repair_ongoing || 0)
      ) || 0;
      const closedToday = item.closed_today ?? "-";
      return `
        <div class="scope-metrics">
          <div class="scope-metric">维保 ${html(maintenance)}</div>
          <div class="scope-metric">变更 ${html(change)}</div>
          <div class="scope-metric">检修 ${html(repair)}</div>
          <div class="scope-metric">进行中 ${html(ongoing)}</div>
          <div class="scope-metric">今日完成 ${html(closedToday)}</div>
        </div>
      `;
    }

    async function loadScopeOverview() {
      try {
        const data = await api("/api/scope-overview");
      updateAuthFromPayload(data);
      state.scopeOptions = data.scope_options || state.scopeOptions;
      state.scopeOverview = data.scopes || {};
      state.lastLoadedAt = data.last_loaded_at || state.lastLoadedAt;
      updateAutoRefreshInterval(data);
      state.warnings = data.warnings || [];
      renderGate();
      } catch (err) {
        state.scopeOverview = {};
        renderGate();
      }
    }

    async function loadHandoverLinks() {
      try {
        const data = await api("/api/handover-links");
        updateAuthFromPayload(data);
        state.handover.scopeOptions = data.scope_options || state.handover.scopeOptions || [];
        state.handover.links = data.links || {};
        state.handover.updatedAt = data.updated_at || "";
        renderGate();
      } catch (err) {
        state.handover.scopeOptions = state.handover.scopeOptions || [];
        renderGate();
      }
    }

    function openHandoverLink(scope) {
      scope = normalizeScopeValue(scope, "");
      const url = String(state.handover.links[scope] || "").trim();
      if (!url) {
        if ((state.auth.user || {}).role !== "admin") {
          alert("该楼栋尚未配置交接班链接，请联系管理员。");
          return;
        }
        state.handover.authOpen = true;
        renderGate();
        const line = $("handoverAuthLine");
        if (line) {
          line.className = "job-line failed";
          line.textContent = "该楼栋尚未配置链接，请先验证设置密码后填写并保存。";
        }
        return;
      }
      window.open(url, "_blank", "noopener");
    }

    function clearWorkbenchViewForScope(scope) {
      state.records = [];
      state.zhihangRecords = [];
      state.ongoing = [];
      state.dailySummary = { date: "", items: [], stats: {} };
      state.selected = new Set();
      state.drafts = new Map();
      state.activeDraftKey = "";
      state.expandedRecordId = "";
      state.expandedSummaryKey = "";
      $("scopeLabel").textContent = scopeLabel(scope);
      setSyncStatus(`正在加载${scopeLabel(scope)}数据`, []);
      render();
    }

    async function saveHandoverLinks() {
      const links = {};
      document.querySelectorAll("[data-handover-link]").forEach((input) => {
        links[input.dataset.handoverLink] = input.value || "";
      });
      const line = $("handoverSaveLine");
      if (line) {
        line.className = "job-line busy";
        line.textContent = "正在保存链接配置";
      }
      try {
        const data = await api("/api/handover-links", {
          method: "POST",
          body: JSON.stringify({ links, password: state.handover.settingsPassword || "" }),
        });
        updateAuthFromPayload(data);
        state.handover.scopeOptions = data.scope_options || state.handover.scopeOptions;
        state.handover.links = data.links || {};
        state.handover.updatedAt = data.updated_at || "";
        state.handoverSettingsOpen = false;
        state.handover.settingsPassword = "";
        renderGate();
      } catch (err) {
        if (line) {
          line.className = "job-line failed";
          line.textContent = err.message || "保存失败";
        }
      }
    }

    async function selectScope(scope, { replace = false } = {}) {
      state.scope = normalizeScopeValue(scope, "ALL");
      if (!scopeAllowed(state.scope)) {
        state.scope = "";
        state.gateMode = "maintenance";
        $("app").classList.add("hidden");
        $("gate").classList.remove("hidden");
        renderGate();
        return;
      }
      const url = stripTransientUrlParams(new URL(window.location.href));
      url.searchParams.set("scope", state.scope);
      url.searchParams.delete("mode");
      if (replace) window.history.replaceState({ scope: state.scope }, "", url);
      else window.history.pushState({ scope: state.scope }, "", url);
      $("gate").classList.add("hidden");
      $("app").classList.remove("hidden");
      const selectedScope = state.scope;
      clearWorkbenchViewForScope(selectedScope);
      try {
        await loadBootstrap();
      } catch (err) {
        if (state.scope === selectedScope) setSyncStatus(err.message || "加载失败", []);
      }
    }

    async function loadBootstrap() {
      const requestScope = normalizeScopeValue(state.scope || "ALL", "ALL");
      setSyncStatus("加载中", []);
      const data = await api(`/api/bootstrap?scope=${encodeURIComponent(requestScope)}`);
      if (normalizeScopeValue(state.scope || "ALL", "ALL") !== requestScope) return;
      updateAuthFromPayload(data);
      state.scopeOptions = data.scope_options || state.scopeOptions;
      state.records = data.records || [];
      state.zhihangRecords = data.zhihang_change_records || [];
      state.ongoing = data.ongoing || [];
      state.dailySummary = data.daily_summary || { date: "", items: [], stats: {} };
      state.defaults = data.defaults || state.defaults;
      state.lastLoadedAt = data.last_loaded_at || "";
      updateAutoRefreshInterval(data);
      state.warnings = data.warnings || [];
      state.workType = WORK_TYPE_VALUES.includes(data.default_work_type)
        ? data.default_work_type
        : (WORK_TYPE_VALUES.includes(state.workType) ? state.workType : "maintenance");
      state.filters.month = state.filters.month || data.filters?.default_month || "";
      $("scopeLabel").textContent = data.scope_label || scopeLabel(state.scope);
      fillSelect("monthSelect", data.filters?.months || [], state.filters.month, false);
      fillSelect("specialtySelect", data.filters?.specialties || [], state.filters.specialty, true);
      setSyncStatus(data.last_loaded_at ? `数据更新时间 ${data.last_loaded_at}` : "已加载", state.warnings);
      loadDraftState();
      loadJobState();
      cleanupDraftState();
      render();
      restoreJobState();
      startAutoRefresh();
    }

    function fillSelect(id, options, selected, includeAll) {
      const el = $(id);
      const opts = includeAll ? ["全部", ...options] : options;
      el.innerHTML = opts.map((x) => `<option value="${html(x)}">${html(x)}</option>`).join("");
      if (selected && opts.includes(selected)) el.value = selected;
      else if (opts.length) {
        el.value = opts[0];
        if (id === "monthSelect") state.filters.month = opts[0];
        if (id === "specialtySelect") state.filters.specialty = opts[0];
      }
    }

    async function refreshWorkbench({ automatic = false } = {}) {
      const requestScope = normalizeScopeValue(state.scope || "ALL", "ALL");
      const params = new URLSearchParams({
        scope: requestScope,
        month: state.filters.month || "",
        specialty: state.filters.specialty === "全部" ? "" : state.filters.specialty,
      });
      setSyncStatus(automatic ? "自动刷新中" : "刷新本页中", []);
      const data = await api(`/api/workbench?${params}`);
      if (normalizeScopeValue(state.scope || "ALL", "ALL") !== requestScope) return;
      updateAuthFromPayload(data);
      state.records = data.records || [];
      state.zhihangRecords = data.zhihang_change_records || [];
      state.ongoing = data.ongoing || [];
      state.dailySummary = data.daily_summary || { date: "", items: [], stats: {} };
      state.lastLoadedAt = data.last_loaded_at || state.lastLoadedAt;
      updateAutoRefreshInterval(data);
      state.warnings = data.warnings || [];
      setSyncStatus(data.last_loaded_at ? `数据更新时间 ${data.last_loaded_at}` : (automatic ? "已自动刷新" : "已刷新"), state.warnings);
      cleanupDraftState();
      render();
      restoreJobState();
      if (!automatic) startAutoRefresh();
    }

    async function syncSource() {
      const requestScope = normalizeScopeValue(state.scope || "ALL", "ALL");
      setSyncStatus("同步源表中", []);
      const data = await api(`/api/refresh?scope=${encodeURIComponent(requestScope)}`);
      if (normalizeScopeValue(state.scope || "ALL", "ALL") !== requestScope) return;
      updateAuthFromPayload(data);
      state.scopeOptions = data.scope_options || state.scopeOptions;
      state.records = data.records || [];
      state.zhihangRecords = data.zhihang_change_records || [];
      state.ongoing = data.ongoing || [];
      state.dailySummary = data.daily_summary || { date: "", items: [], stats: {} };
      state.defaults = data.defaults || state.defaults;
      state.lastLoadedAt = data.last_loaded_at || "";
      updateAutoRefreshInterval(data);
      state.warnings = data.warnings || [];
      setSyncStatus(data.last_loaded_at ? `数据更新时间 ${data.last_loaded_at}` : "已同步", state.warnings);
      cleanupDraftState();
      render();
      restoreJobState();
      loadScopeOverview();
      startAutoRefresh();
    }

    function render() {
      renderWorkTypeTabs();
      renderSummary();
      renderRecords();
      renderDrafts();
      renderOngoing();
      const recordCounts = recordTypeCounts();
      const ongoingCounts = ongoingTypeCounts();
      $("recordCount").textContent = `待发起 ${WORK_TYPES.map((item) => `${item.label} ${recordCounts[item.value] || 0}`).join(" / ")}`;
      $("ongoingCount").textContent = `进行中 ${WORK_TYPES.map((item) => `${item.label} ${ongoingCounts[item.value] || 0}`).join(" / ")}`;
    }

    function renderWorkTypeTabs() {
      const counts = recordTypeCounts();
      $("workTypeTabs").innerHTML = WORK_TYPES.map((item) => `
        <button class="type-tab ${state.workType === item.value ? "active" : ""}" data-work-type="${item.value}">
          ${html(item.label)} ${html(counts[item.value] || 0)}
        </button>
      `).join("");
      document.querySelectorAll("[data-work-type]").forEach((btn) => {
        btn.addEventListener("click", () => setWorkType(btn.dataset.workType));
      });
      const otherType = WORK_TYPES
        .map((item) => item.value)
        .filter((type) => type !== state.workType)
        .sort((a, b) => (counts[b] || 0) - (counts[a] || 0))[0];
      const currentCount = counts[state.workType] || 0;
      const otherCount = counts[otherType] || 0;
      let hint = "";
      if (!currentCount && otherCount) {
        hint = `当前${workTypeLabel(state.workType)}没有待发起事项，${workTypeLabel(otherType)}有 ${otherCount} 条。`;
      }
      $("workTypeHint").textContent = hint;
      $("workTypeHint").classList.toggle("hidden", !hint);
    }

    function setWorkType(type) {
      type = WORK_TYPE_VALUES.includes(type) ? type : "maintenance";
      if (state.workType === type) return;
      saveDraftState();
      state.workType = type;
      loadDraftState();
      cleanupDraftState();
      render();
      restoreJobState();
    }

    function renderSummary() {
      const summary = state.dailySummary || {};
      const stats = summary.stats || {};
      $("summaryDate").textContent = summary.date || "今日";
      const metrics = [
        ["已发起", stats.started || 0, "green"],
        ["有更新", stats.updated || 0, "blue"],
        ["已结束", stats.ended || 0, "amber"],
        ["进行中", stats.ongoing || state.ongoing.length || 0, "red"],
      ];
      $("summaryMetrics").innerHTML = metrics.map(([label, value, color]) => `
        <div class="metric">
          <span class="tag ${color}">${html(label)}</span>
          <strong>${html(value)}</strong>
        </div>
      `).join("");
      const items = summary.items || [];
      if (!items.length) {
        $("summaryTimeline").innerHTML = `<div class="empty" style="min-width:100%">今天还没有通过网页完成的通告动作</div>`;
        return;
      }
      $("summaryTimeline").innerHTML = items.slice(0, 12).map((item) => {
        const key = item.key || item.fallback_key || item.title;
        const open = state.expandedSummaryKey === key;
        const actions = item.actions || [];
        return `
          <article class="timeline-item" data-summary-key="${html(key)}">
            <div class="timeline-title">${html(item.title || "未命名通告")}</div>
            <div class="record-meta">${html([workTypeLabel(item.work_type), item.building, item.specialty, item.status].filter(Boolean).join(" | "))}</div>
            <div class="record-meta">开始 ${html(item.started_at || "-")}；结束 ${html(item.ended_at || "-")}</div>
            ${open ? `<div class="work-detail">${summaryDetailHtml(item, actions)}</div>` : ""}
          </article>
        `;
      }).join("");
      document.querySelectorAll("[data-summary-key]").forEach((el) => {
        el.addEventListener("click", () => {
          state.expandedSummaryKey = state.expandedSummaryKey === el.dataset.summaryKey ? "" : el.dataset.summaryKey;
          renderSummary();
        });
      });
    }

    function summaryDetailHtml(item, actions) {
      const completedDate = item.completed_date || datePart(item.ended_at);
      const actionText = (actions || []).map((action) => {
        const line = `${action.time || "-"} ${action.label || action.action || ""}${action.progress ? "：" + action.progress : ""}`;
        return html(line);
      }).join("<br>");
      return `
        <strong>计划时间：</strong>${html(item.start_time || "-")} ~ ${html(item.end_time || "-")}<br>
        <strong>完成日期：</strong>${html(completedDate || "-")}<br>
        <strong>多维记录：</strong>${html(item.feishu_record_id || "-")}<br>
        <strong>位置：</strong>${html(item.location || "-")}<br>
        <strong>进度轨迹：</strong><br>${actionText || "-"}
      `;
    }

    function visibleRecords() {
      const q = state.filters.search.trim().toLowerCase();
      return state.records.filter((record) => {
        const f = fieldsOf(record);
        if ((record.work_type || "maintenance") !== state.workType) return false;
        const text = [
          titleForRecord(record),
          f["维护周期"] || "",
          f["维护总项"] || "",
          f["维护编号"] || "",
          f["维护项目"] || "",
          f["变更简述"] || "",
          f["变更编码&描述"] || "",
          f["专业"] || "",
          f["维修名称"] || "",
          f["维修单号"] || "",
          f["设备名称"] || "",
          f["设备编号"] || "",
          f["故障维修原因"] || "",
          f["故障发生现象描述"] || "",
          f["维修进展描述"] || "",
          f["所属专业"] || "",
          f["专业（推送消息用）"] || "",
        ].join(" ").toLowerCase();
        return !q || text.includes(q);
      });
    }

    function recordMetaText(record) {
      const f = fieldsOf(record);
      const type = record.work_type || "maintenance";
      if (type === "change") {
        const start = f["变更开始日期（阿里）"] || "";
        const end = f["变更结束日期（阿里）"] || "";
        return [
          `楼栋 ${buildingForRecord(record) || "-"}`,
          `专业 ${specialtyForRecord(record) || "-"}`,
          `等级 ${levelForRecord(record) || "-"}`,
          `计划 ${start || "-"} ~ ${end || "-"}`,
          `进度 ${f["变更进度"] || "-"}`,
          `源ID ${record.source_record_id || record.record_id || "-"}`,
        ].join(" | ");
      }
      if (type === "repair") {
        const faultTime = firstRepairField(record, ["故障发生时间", "发现故障时间"]);
        const expectedTime = firstRepairField(record, ["期望完成时间", "维修结束时间", "维修结束时间（2026）"]);
        return [
          `楼栋 ${buildingForRecord(record) || "-"}`,
          `专业 ${specialtyForRecord(record) || "-"}`,
          `设备 ${repairDeviceText(record) || "-"}`,
          `故障 ${faultTime || "-"}`,
          `期望 ${expectedTime || "-"}`,
          `流程 ${f["流程"] || "-"}`,
          `源ID ${record.source_record_id || record.record_id || "-"}`,
        ].join(" | ");
      }
      return [
        buildingForRecord(record),
        specialtyForRecord(record),
        f["计划维护月份"],
        `源状态 ${sourceProgressForRecord(record) || "-"}`,
        f["维护编号"],
        f["维护项目"],
      ].filter(Boolean).join(" | ");
    }

    function emptyRecordHtml() {
      const counts = recordTypeCounts();
      const otherType = WORK_TYPES
        .map((item) => item.value)
        .filter((type) => type !== state.workType)
        .sort((a, b) => (counts[b] || 0) - (counts[a] || 0))[0];
      const otherCount = counts[otherType] || 0;
      let message = "";
      if (state.workType === "change" && (state.scope || "ALL") === "CAMPUS") {
        message = "当前园区无多楼栋变更；单楼栋变更请进入对应楼栋或查看全部。";
      } else if (state.workType === "change") {
        message = "当前楼栋没有未开始变更。";
      } else if (state.workType === "repair") {
        message = "当前范围没有待发起检修事项；检修来源于“检修中与未开始”视图，且会排除无维修名称或无法识别楼栋的记录。";
      } else {
        message = "当前范围没有待发起维保事项，请检查计划维护月份或专业类别筛选。";
      }
      const switchButton = otherCount
        ? `<button class="btn blue" data-empty-switch-type="${html(otherType)}">查看${html(workTypeLabel(otherType))} ${html(otherCount)}</button>`
        : "";
      return `<div class="empty">${html(message)}${switchButton ? `<div style="margin-top:10px">${switchButton}</div>` : ""}</div>`;
    }

    function recordCardHtml(record) {
        const key = recordKey(record);
        const selected = state.selected.has(key);
        const ongoing = isRecordOngoing(record);
        const summary = record.work_summary || {};
        const completed = summary.status === "已结束";
        const started = Boolean(summary.started_at);
        const sourceUpdate = isSourceOngoingRecord(record);
        const disabled = isRecordUnavailableForSelection(record);
        const expanded = state.expandedRecordId === record.record_id;
        const completedLabel = dayLabel(summary.completed_date || summary.ended_at);
        const startedLabel = dayLabel(summary.started_date || summary.started_at);
        const sourceActionText = sourceActionLabel(record);
        const tagText = selected
          ? "已选择"
          : completed
            ? (completedLabel ? `${completedLabel}已完成` : "已完成")
            : ongoing
              ? "右侧操作"
              : sourceUpdate
                ? "可更新"
                : started
                ? (startedLabel ? `${startedLabel}已开始` : "已开始")
                : `可${sourceActionText}`;
        const tagClass = selected ? "green" : completed ? "green" : ongoing ? "amber" : sourceUpdate ? "blue" : started ? "amber" : "blue";
        return `
          <article class="record-card ${selected ? "selected" : ""} ${disabled ? "disabled" : ""} ${completed ? "completed" : ""}" data-record-key="${html(key)}">
            <div class="record-title">
              <span>${html(recordCardTitle(record))}</span>
              <span class="tag ${tagClass}">${html(workTypeLabel(record.work_type))} · ${html(tagText)}</span>
            </div>
            <div class="record-meta">${html(recordMetaText(record))}</div>
            ${started ? `<div class="work-detail ${expanded ? "" : "hidden"}">${summaryDetailHtml(summary, summary.actions || [])}</div>` : ""}
          </article>
        `;
    }

    function bindRecordEvents() {
      document.querySelectorAll("[data-record-key]").forEach((el) => {
        el.addEventListener("click", () => {
          const record = state.records.find((x) => recordKey(x) === el.dataset.recordKey);
          if (!record) return;
          const summary = record.work_summary || {};
          if (isRecordUnavailableForSelection(record)) {
            state.expandedRecordId = state.expandedRecordId === record.record_id ? "" : record.record_id;
            renderRecords();
            return;
          }
          const key = recordKey(record);
          if (state.selected.has(key)) {
            state.selected.delete(key);
            if (state.activeDraftKey === key) state.activeDraftKey = "";
          }
          else {
            state.selected.add(key);
            state.activeDraftKey = key;
            getDraft(record);
          }
          saveDraftState();
          render();
        });
      });
    }

    function selectedZhihangIds() {
      const ids = new Set();
      for (const draft of state.drafts.values()) {
        if (draft?.zhihang_involved && draft?.zhihang_record_id) {
          ids.add(String(draft.zhihang_record_id));
        }
      }
      return ids;
    }

    function draftWorkType(key) {
      const draft = state.drafts.get(key);
      if (draft?.work_type) return draft.work_type;
      const record = state.records.find((item) => recordKey(item) === key);
      return record?.work_type || "";
    }

    function activeChangeDraftKey() {
      if (
        state.activeDraftKey
        && state.selected.has(state.activeDraftKey)
        && draftWorkType(state.activeDraftKey) === "change"
      ) {
        return state.activeDraftKey;
      }
      return Array.from(state.selected).find((key) => draftWorkType(key) === "change") || "";
    }

    function visibleZhihangRecords() {
      const q = state.filters.search.trim().toLowerCase();
      const selectedIds = selectedZhihangIds();
      return (state.zhihangRecords || []).filter((record) => {
        if (selectedIds.has(String(record.record_id || ""))) return false;
        const f = record.display_fields || {};
        const text = [
          zhihangTitle(record),
          record.progress || "",
          record.scope_label || "",
          record.level || "",
          record.change_type || "",
          f["工单号"] || "",
          f["编码"] || "",
          f["楼栋"] || "",
        ].join(" ").toLowerCase();
        return !q || text.includes(q);
      });
    }

    function assignZhihangRecord(recordId) {
      const draftKey = activeChangeDraftKey();
      const draft = draftKey ? state.drafts.get(draftKey) : null;
      const record = findZhihangRecord(recordId);
      if (!draft || !draft.zhihang_involved || !record) return;
      draft.zhihang_involved = true;
      draft.zhihang_record_id = record.record_id || "";
      draft.zhihang_title = zhihangTitle(record);
      draft.zhihang_progress = record.progress || "";
      draft.job_id = "";
      draft.operation_id = "";
      state.activeDraftKey = draftKey;
      forgetJobsForLine(draftKey);
      saveDraftState();
      render();
    }

    function bindZhihangEvents() {
      document.querySelectorAll("[data-zhihang-record]").forEach((el) => {
        el.addEventListener("click", () => {
          if (el.classList.contains("disabled")) return;
          assignZhihangRecord(el.dataset.zhihangRecord);
        });
      });
    }

    function renderZhihangColumn() {
      const records = visibleZhihangRecords();
      const activeKey = activeChangeDraftKey();
      const activeDraft = activeKey ? state.drafts.get(activeKey) : null;
      const canBind = Boolean(activeDraft && activeDraft.zhihang_involved);
      const body = records.length
        ? records.map((record) => `
            <article class="zhihang-card ${canBind ? "" : "disabled"}" data-zhihang-record="${html(record.record_id)}">
              <div class="record-title">
                <span>${html(zhihangTitle(record))}</span>
                <span class="tag blue">智航</span>

    function bindDraftEvents() {
      document.querySelectorAll("[data-draft-field]").forEach((el) => {
        const updateDraftField = () => {
          const marker = el.dataset.draftField.lastIndexOf(":");
          const id = el.dataset.draftField.slice(0, marker);
          const key = el.dataset.draftField.slice(marker + 1);
          const draft = state.drafts.get(id);
          if (draft) {
            draft[key] = el.value;
            draft.job_id = "";
            draft.operation_id = "";
            state.actionOps.delete(`${id}:start`);
            forgetJobsForLine(id);
            setActionButtonsDisabled(id, false);
            saveDraftState();
            const line = document.querySelector(`[data-job-line="${CSS.escape(id)}"]`);
            if (line) {
              line.className = "job-line";
              line.textContent = "内容已修改，请重新发送";
            }
          }
        };
        el.addEventListener("input", updateDraftField);
        el.addEventListener("change", updateDraftField);
      });
      document.querySelectorAll("[data-draft-card]").forEach((card) => {
        card.addEventListener("click", (event) => {
          if (event.target.closest("button, input, textarea, select")) return;
          state.activeDraftKey = card.dataset.draftCard || "";
          renderRecords();
          renderDrafts();
        });
      });
      document.querySelectorAll("[data-toggle-zhihang]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.toggleZhihang;
          const draft = state.drafts.get(id);
          if (!draft) return;
          const next = !draft.zhihang_involved;
          draft.zhihang_involved = next;
          if (!next) {
            draft.zhihang_record_id = "";
            draft.zhihang_title = "";
            draft.zhihang_progress = "";
          }
          draft.job_id = "";
          draft.operation_id = "";
          state.activeDraftKey = id;
          forgetJobsForLine(id);
          saveDraftState();
          render();
        });
      });
      document.querySelectorAll("[data-clear-zhihang]").forEach((btn) => {
        btn.addEventListener("click", () => {
          const id = btn.dataset.clearZhihang;
          const draft = state.drafts.get(id);
          if (!draft) return;
          draft.zhihang_record_id = "";
          draft.zhihang_title = "";
          draft.zhihang_progress = "";
          draft.job_id = "";
          draft.operation_id = "";
          state.activeDraftKey = id;
          forgetJobsForLine(id);
          saveDraftState();
          render();
        });
      });
      document.querySelectorAll("[data-remove-draft]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.selected.delete(btn.dataset.removeDraft);
          state.drafts.delete(btn.dataset.removeDraft);
          if (state.activeDraftKey === btn.dataset.removeDraft) state.activeDraftKey = "";
          saveDraftState();
          render();
        });
      });
      document.querySelectorAll("[data-send-start]").forEach((btn) => {
        btn.addEventListener("click", () => sendStart(btn.dataset.sendStart));
      });
    }

    function toDatetimeLocal(text) {
      const raw = String(text || "").trim();
      const chinese = raw.match(/(\d{4})\D+(\d{1,2})\D+(\d{1,2})\D+(\d{1,2})(?:\D+(\d{1,2}))?/);
      if (chinese) {
        return `${pad(chinese[1])}-${pad(chinese[2])}-${pad(chinese[3])}T${pad(chinese[4])}:${pad(chinese[5] || "00")}`;
      }
      const normalized = raw.replace(/\//g, "-").replace(" ", "T");
      if (/^\d{4}-\d{1,2}-\d{1,2}T\d{1,2}:\d{2}/.test(normalized)) {
        const [date, time] = normalized.split("T");
        const [y, m, d] = date.split("-").map((x) => pad(x));
        return `${y}-${m}-${d}T${time.slice(0, 5)}`;
      }
      return "";
    }

    function readOngoingPayload(activeItemId, action) {
      const item = state.ongoing.find((x) => x.active_item_id === activeItemId);
      const card = document.querySelector(`[data-ongoing="${CSS.escape(activeItemId)}"]`);
      const field = (key) => card?.querySelector(`[data-draft-field="${CSS.escape(activeItemId + ":" + key)}"]`);
      const read = (key, fallback = "") => {
        const el = field(key);
        return el ? el.value : fallback;
      };
      const range = splitTimeRange(item?.time || "", item?.start_time || "", item?.end_time || "");
      const isRepair = (item?.work_type || "maintenance") === "repair";
      const expectedTime = read("expected_time", item?.expected_time || item?.start_time || range.end || "");
      const faultTime = read("fault_time", item?.fault_time || item?.end_time || range.start || "");
      return {
        action,
        scope: state.scope,
        work_type: item?.work_type || "maintenance",
        notice_type: item?.notice_type || "",
        record_id: item?.record_id || "",
        target_record_id: item?.target_record_id || item?.record_id || "",
        source_record_id: item?.source_record_id || "",
        source_app_token: item?.source_app_token || "",
        source_table_id: item?.source_table_id || "",
        maintenance_cycle: item?.maintenance_cycle || "",
        specialty: isRepair
          ? read("specialty", item?.specialty || "")
          : (state.filters.specialty === "全部" ? (item?.specialty || "") : state.filters.specialty),
        active_item_id: activeItemId,
        title: isRepair ? (read("content", item?.title || "") || item?.title || "") : (item?.title || ""),
        building: item?.building || "",
        building_codes: item?.building_codes || [],
        level: isRepair ? read("level", item?.level || "") : (item?.level || ""),
        source_progress: item?.source_progress || "",
        start_time: isRepair ? expectedTime : read("start_time", range.start),
        end_time: isRepair ? faultTime : read("end_time", range.end),
        location: read("location", item?.location || ""),
        content: read("content", item?.content || ""),
        reason: read("reason", item?.reason || ""),
        impact: isRepair ? read("impact", item?.impact || "") : read("impact", item?.impact || state.defaults.impact),
        progress: read("progress", item?.progress || ""),
        repair_device: isRepair ? read("repair_device", item?.repair_device || "") : (item?.repair_device || ""),
        repair_fault: isRepair ? read("repair_fault", item?.repair_fault || item?.reason || "") : (item?.repair_fault || item?.reason || ""),
        fault_type: isRepair ? read("fault_type", item?.fault_type || "设备故障") : (item?.fault_type || "设备故障"),
        repair_mode: isRepair ? read("repair_mode", item?.repair_mode || "") : (item?.repair_mode || ""),
        discovery: isRepair ? read("discovery", item?.discovery || "") : (item?.discovery || ""),
        symptom: isRepair ? read("symptom", item?.symptom || "") : (item?.symptom || ""),
        solution: isRepair ? read("solution", item?.solution || "") : (item?.solution || ""),
        fault_time: isRepair ? faultTime : (item?.fault_time || ""),
        expected_time: isRepair ? expectedTime : (item?.expected_time || ""),
        zhihang_involved: Boolean(item?.zhihang_involved || item?.zhihang_record_id),
        zhihang_record_id: item?.zhihang_record_id || "",
        zhihang_title: item?.zhihang_title || "",
        zhihang_progress: item?.zhihang_progress || "",
        operation_id: opFor(`${activeItemId}:${action}`),
      };
    }

    async function deleteOngoing(activeItemId) {
      const item = state.ongoing.find((x) => x.active_item_id === activeItemId);
      if (!item) return;
      const card = document.querySelector(`[data-ongoing="${CSS.escape(activeItemId)}"]`);
      try {
        setActionButtonsDisabled(activeItemId, true);
        const hasRemoteRecord = Boolean(item.record_id || item.target_record_id);
        setJobLine(activeItemId, hasRemoteRecord ? "正在删除多维记录和 Qt 条目" : "正在删除 Qt 条目", "busy");
        const payload = {
          scope: state.scope,
          work_type: item.work_type || "maintenance",
          notice_type: item.notice_type || "",
          active_item_id: item.active_item_id || "",
          record_id: item.record_id || "",
          raw_record_id: item.raw_record_id || "",
          target_record_id: item.target_record_id || item.record_id || "",
          source_record_id: item.source_record_id || "",
          source_app_token: item.source_app_token || "",
          source_table_id: item.source_table_id || "",
          zhihang_involved: Boolean(item.zhihang_involved || item.zhihang_record_id),
          zhihang_record_id: item.zhihang_record_id || "",
          zhihang_title: item.zhihang_title || "",
          zhihang_progress: item.zhihang_progress || "",
          source_only: Boolean(item.source_only),
          title: item.title || "",
          building: item.building || "",
          building_codes: item.building_codes || [],
          specialty: item.specialty || "",
        };
        await api("/api/ongoing-items/delete", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        if (card) card.classList.add("removing");
        await new Promise((resolve) => setTimeout(resolve, 180));
        state.ongoing = state.ongoing.filter((x) => x.active_item_id !== activeItemId);
        render();
        await refreshWorkbench({ automatic: true });
      } catch (err) {
        if (card) card.classList.remove("removing");
        setJobLine(activeItemId, err.message || "删除失败", "failed");
        setActionButtonsDisabled(activeItemId, false);
      }
    }

    function bindOngoingEvents() {
      document.querySelectorAll(".ongoing-card [data-draft-field]").forEach((el) => {
        el.addEventListener("input", () => {
          const [id] = el.dataset.draftField.split(":");
          state.actionOps.delete(`${id}:update`);
          state.actionOps.delete(`${id}:end`);
          forgetJobsForLine(id);
          setActionButtonsDisabled(id, false);
          const line = document.querySelector(`[data-job-line="${CSS.escape(id)}"]`);
          if (line) {
            line.className = "job-line";
            line.textContent = "内容已修改，请重新发送";
          }
        });
      });
      document.querySelectorAll("[data-send-update]").forEach((btn) => {
        btn.addEventListener("click", () => sendAction(readOngoingPayload(btn.dataset.sendUpdate, "update"), btn.dataset.sendUpdate));
      });
      document.querySelectorAll("[data-send-end]").forEach((btn) => {
        btn.addEventListener("click", () => sendAction(readOngoingPayload(btn.dataset.sendEnd, "end"), btn.dataset.sendEnd));
      });
      document.querySelectorAll("[data-delete-ongoing]").forEach((btn) => {
        btn.addEventListener("click", () => deleteOngoing(btn.dataset.deleteOngoing));
      });
    }

    async function sendStart(recordId) {
      const record = draftRecordForKey(recordId);
      const draft = state.drafts.get(recordId);
      if (!record || !draft) return;
      const type = record.work_type || "maintenance";
      const draftSpecialty = String(draft.specialty || "").trim();
      const recordSpecialty = String((record.manual || (type === "repair" && draftSpecialty)) ? draftSpecialty : specialtyForRecord(record) || "").trim();
      const uploadSpecialty = type === "repair"
        ? recordSpecialty
        : record.manual
        ? recordSpecialty
        : state.filters.specialty && state.filters.specialty !== "全部"
        ? state.filters.specialty
        : recordSpecialty;
      if (!uploadSpecialty || uploadSpecialty === "全部") {
        setJobLine(recordId, "该事项缺少专业类别，无法上传", "failed");
        return;
      }
      if (record.manual && type === "maintenance" && !String(draft.maintenance_cycle || "").trim()) {
        setJobLine(recordId, "纯手填维保必须选择维保周期", "failed");
        return;
      }
      if (type === "change" && draft.zhihang_involved && !draft.zhihang_record_id) {
        setJobLine(recordId, "该变更已标记涉及智航，请先选择右侧智航侧变更", "failed");
        state.activeDraftKey = recordId;
        renderRecords();
        return;
      }
      const action = record.manual ? "start" : sourceActionForRecord(record);
      const targetRecordId = targetRecordIdForRecord(record);
      await sendAction({
        action,
        scope: state.scope,
        work_type: record.work_type || "maintenance",
        notice_type: record.notice_type || "",
        manual: Boolean(record.manual),
        manual_id: record.manual ? recordId : "",
        source_app_token: record.manual ? "" : (record.source_app_token || ""),
        source_table_id: record.manual ? "" : (record.source_table_id || ""),
        maintenance_cycle: record.manual ? (draft.maintenance_cycle || "") : (fieldsOf(record)["维护周期"] || ""),
        specialty: uploadSpecialty,
        record_id: action === "start" ? record.record_id : targetRecordId,
        source_record_id: record.manual ? "" : record.record_id,
        target_record_id: action === "update" ? targetRecordId : "",
        source_progress: sourceProgressForRecord(record),
        building_codes: record.manual ? [] : (record.building_codes || []),
        building: record.manual ? (draft.building || "") : buildingForRecord(record),
        title: record.manual ? (draft.title || "") : (type === "repair" ? draft.content : titleForRecord(record)),
        level: record.manual ? (draft.level || "") : (type === "repair" ? (draft.level || "") : (type === "change" ? levelForRecord(record) : "")),
        start_time: draft.start_time,
        end_time: draft.end_time,
        location: draft.location,
        content: draft.content,
        reason: draft.reason,
        impact: draft.impact,
        progress: draft.progress,
        zhihang_involved: type === "change" ? Boolean(draft.zhihang_involved) : false,
        zhihang_record_id: type === "change" ? (draft.zhihang_record_id || "") : "",
        zhihang_title: type === "change" ? (draft.zhihang_title || "") : "",
        zhihang_progress: type === "change" ? (draft.zhihang_progress || "") : "",
        repair_device: type === "repair" ? (draft.repair_device || "") : "",
        repair_fault: type === "repair" ? (draft.repair_fault || "") : "",
        fault_type: type === "repair" ? (draft.fault_type || "") : "",
        repair_mode: type === "repair" ? (draft.repair_mode || "") : "",
        discovery: type === "repair" ? (draft.discovery || "") : "",
        symptom: type === "repair" ? (draft.symptom || "") : "",
        solution: type === "repair" ? (draft.solution || "") : "",
        fault_time: type === "repair" ? (draft.end_time || "") : "",
        expected_time: type === "repair" ? (draft.start_time || "") : "",
        operation_id: draft.operation_id || (draft.operation_id = opFor(`${recordId}:${action}`)),
      }, recordId);
      saveDraftState();
    }

    async function sendAction(payload, lineKey) {
      const localKey = jobLocalKey(payload, lineKey);
      try {
        setActionButtonsDisabled(lineKey, true);
        setJobLine(lineKey, "提交中，准备加入上传队列", "busy");
        const data = await api("/api/workbench-actions", {
          method: "POST",
          body: JSON.stringify(payload),
        });
        const jobId = data.job_id;
        if (payload.operation_id) state.jobToOpKey.set(jobId, payload.operation_id);
        rememberJobState(localKey, {
          job_id: jobId,
          line_key: lineKey,
          payload,
          operation_id: payload.operation_id || "",
          phase: "queued",
          text: `已加入上传队列 ${jobId.slice(0, 8)}`,
          status: "busy",
        });
        const draft = state.drafts.get(lineKey);
        if (draft) {
          draft.job_id = jobId;
          saveDraftState();
        }
        setJobLine(lineKey, `已加入上传队列 ${jobId.slice(0, 8)}`, "busy");
        pollJob(jobId, lineKey, localKey);
      } catch (err) {
        setJobLine(lineKey, err.message || "提交失败", "failed");
        setActionButtonsDisabled(lineKey, false);
        rememberJobState(localKey, {
          line_key: lineKey,
          payload,
          phase: "failed",
          text: err.message || "提交失败",
          status: "failed",
        });
      }
    }

    function pollJob(jobId, lineKey, localKey = "") {
      if (state.polling.has(jobId)) return;
      state.polling.add(jobId);
      const tick = async () => {
        try {
          const job = await api(`/api/jobs/${encodeURIComponent(jobId)}`);
          const phase = job.phase || "";
          if (phase === "success") {
            setJobLine(lineKey, `已完成，多维记录 ${job.record_id || ""}`, "success");
            setActionButtonsDisabled(lineKey, true);
            if (state.drafts.has(lineKey)) {
              state.selected.delete(lineKey);
              state.drafts.delete(lineKey);
              saveDraftState();
            }
            const operationId = state.jobToOpKey.get(jobId);
            if (operationId) {
              for (const [key, value] of Array.from(state.actionOps.entries())) {
                if (value === operationId) state.actionOps.delete(key);
              }
              state.jobToOpKey.delete(jobId);
            }
            state.polling.delete(jobId);
            forgetJobState(localKey);
            await refreshWorkbench();
            return;
          }
          if (phase === "failed") {
            const jobType = job.prepared?.work_type || job.request?.work_type || "maintenance";
            const prefix = jobType === "change"
              ? "变更上传失败"
              : jobType === "repair"
                ? "检修上传失败"
                : (job.message_sent ? "消息已发送，上传失败" : "操作失败");
            const text = `${prefix}: ${job.error || job.upload_message || ""}`;
            setJobLine(lineKey, text, "failed");
            setActionButtonsDisabled(lineKey, false);
            rememberJobState(localKey, {
              job_id: jobId,
              line_key: lineKey,
              phase: "failed",
              text,
              status: "failed",
              message_sent: Boolean(job.message_sent),
            });
            if (!job.message_sent) {
              const operationId = state.jobToOpKey.get(jobId);
              if (operationId) {
                for (const [key, value] of Array.from(state.actionOps.entries())) {
                  if (value === operationId) state.actionOps.delete(key);
                }
              }
            }
            state.polling.delete(jobId);
            return;
          }
          const queuedLabel = job.queue_position
            ? `排队中，第 ${job.queue_position} 位`
            : "排队中";
          const label = {
            queued: queuedLabel,
            sending_message: "队列已轮到，正在发送个人飞书消息",
            uploading: job.prepared?.work_type === "change"
              ? "正在上传变更多维"
              : job.prepared?.work_type === "repair"
                ? "正在上传检修多维"
                : "个人消息已发送，正在上传多维",
          }[phase] || "处理中";
          setJobLine(lineKey, label, "busy");
          setActionButtonsDisabled(lineKey, true);
          rememberJobState(localKey, {
            job_id: jobId,
            line_key: lineKey,
            phase,
            text: label,
            status: "busy",
          });
          setTimeout(tick, 1200);
        } catch (err) {
          const lost = /任务不存在|404/.test(err.message || "");
          const text = lost ? "任务状态已丢失，请核对多维后重试" : (err.message || "任务查询失败");
          setJobLine(lineKey, text, "failed");
          setActionButtonsDisabled(lineKey, false);
          rememberJobState(localKey, {
            job_id: jobId,
            line_key: lineKey,
            phase: lost ? "lost" : "failed",
            text,
            status: "failed",
          });
          state.polling.delete(jobId);
        }
      };
      setTimeout(tick, 700);
    }

    function restoreJobState() {
      for (const [localKey, saved] of Array.from(state.jobStates.entries())) {
        const lineKey = saved.line_key || "";
        const jobId = saved.job_id || "";
        if (!lineKey) continue;
        const visibleLine = document.querySelector(`[data-job-line="${CSS.escape(lineKey)}"]`);
        if (!visibleLine && !hasLiveJobTarget(lineKey, saved)) {
          state.jobStates.delete(localKey);
          saveJobState();
          continue;
        }
        if (visibleLine) setJobLine(lineKey, saved.text || "任务处理中", saved.status || "busy");
        if (["queued", "sending_message", "uploading"].includes(saved.phase || "") && jobId) {
          if (visibleLine) setActionButtonsDisabled(lineKey, true);
          pollJob(jobId, lineKey, localKey);
        } else if (["failed", "lost"].includes(saved.phase || "")) {
          if (visibleLine) setActionButtonsDisabled(lineKey, false);
        }
      }
    }

    function hasLiveJobTarget(lineKey, saved) {
      if (state.selected.has(lineKey) || state.drafts.has(lineKey)) return true;
      const payload = saved?.payload || {};
      const workType = payload.work_type || "";
      const source = payload.source_record_id || payload.record_id || payload.active_item_id || "";
      return state.records.some((record) => {
        if (workType && (record.work_type || "maintenance") !== workType) return false;
        return recordKey(record) === lineKey || (source && record.record_id === source);
      }) || state.ongoing.some((item) => {
        if (workType && (item.work_type || "maintenance") !== workType) return false;
        return [item.active_item_id, item.record_id, item.source_record_id].some((value) => value && (value === lineKey || value === source));
      });
    }

    async function sendAllStart() {
      const ids = Array.from(state.selected);
      for (const id of ids) {
        await sendStart(id);
      }
    }

    function bindWorkspaceClickFocus() {
      const workspace = $("workspace");
      if (!workspace) return;
      const focusClasses = ["focus-left", "focus-middle", "focus-right"];
      const setFocus = (zone) => {
        workspace.classList.remove(...focusClasses);
        if (zone && zone !== "left") workspace.classList.add(`focus-${zone}`);
      };
      workspace.addEventListener("click", (event) => {
        if (event.target.closest("button, input, textarea, select, a, summary, details")) return;
        const panel = event.target.closest("[data-workspace-zone]");
        if (!panel || !workspace.contains(panel)) return;
        const zone = panel.dataset.workspaceZone || "";
        if (zone === "left") {
          setFocus("");
          return;
        }
        const focusClass = `focus-${zone}`;
        setFocus(workspace.classList.contains(focusClass) ? "" : zone);
      }, true);
    }

    $("refreshBtn").addEventListener("click", refreshWorkbench);
    $("refreshOngoingBtn").addEventListener("click", refreshWorkbench);
    $("syncSourceBtn").addEventListener("click", syncSource);
    $("switchScopeBtn").addEventListener("click", () => showGate("maintenance"));
    $("homeBtn").addEventListener("click", () => showGate("home"));
    $("logoutBtn").addEventListener("click", logout);
    $("clearSelectionBtn").addEventListener("click", () => {
      state.selected.clear();
      state.drafts.clear();
      saveDraftState();
      render();
    });
    $("addManualDraftBtn").addEventListener("click", addManualDraft);
    $("sendAllStartBtn").addEventListener("click", sendAllStart);
    $("monthSelect").addEventListener("change", (e) => {
      state.filters.month = e.target.value;
      refreshWorkbench();
    });
    $("specialtySelect").addEventListener("change", (e) => {
      state.filters.specialty = e.target.value;
      refreshWorkbench();
    });
    $("searchInput").addEventListener("input", (e) => {
      state.filters.search = e.target.value || "";
      renderRecords();
      renderWorkTypeTabs();
    });

    async function initApp() {
      if (oauthRedirecting) return;
      bindWorkspaceClickFocus();
      await loadAuthStatus();
      if (!hasPortalAccess()) {
        stopAutoRefresh();
        $("app").classList.add("hidden");
        $("gate").classList.remove("hidden");
        renderGate();
        return;
      }
      if (state.scope && scopeAllowed(state.scope)) {
        await selectScope(state.scope, { replace: true }).catch((err) => {
          setSyncStatus(err.message || "加载失败", []);
        });
        return;
      }
      if (state.scope && !scopeAllowed(state.scope)) {
        state.scope = "";
        state.gateMode = "maintenance";
      }
      renderGate();
      if (state.gateMode === "maintenance") loadScopeOverview();
      if (state.gateMode === "handover") loadHandoverLinks();
    }

    window.addEventListener("popstate", () => {
      const scope = urlScope();
      const mode = urlMode();
      state.scope = scope;
      if (scope) {
        if (!scopeAllowed(scope)) {
          state.scope = "";
          state.gateMode = "maintenance";
          $("app").classList.add("hidden");
          $("gate").classList.remove("hidden");
          renderGate();
          return;
        }
        $("gate").classList.add("hidden");
        $("app").classList.remove("hidden");
        const selectedScope = state.scope;
        clearWorkbenchViewForScope(selectedScope);
        loadBootstrap().catch((err) => {
          if (state.scope === selectedScope) setSyncStatus(err.message || "加载失败", []);
        });
      } else {
        stopAutoRefresh();
        state.gateMode = ["maintenance", "handover"].includes(mode) ? mode : "home";
        $("app").classList.add("hidden");
        $("gate").classList.remove("hidden");
        renderGate();
        if (state.gateMode === "maintenance") loadScopeOverview();
        if (state.gateMode === "handover") loadHandoverLinks();
      }
    });
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && state.scope && !$("app").classList.contains("hidden")) {
        runAutoRefresh();
      }
    });
    initApp();
  </script>
</body>

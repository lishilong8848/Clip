<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>南通基地-运维灯塔工作台</title>
  <style>
    :root {
      --bg: #eef3f5;
      --ink: #132331;
      --muted: #607080;
      --line: #d3dde4;
      --panel: #ffffff;
      --panel-2: #f7fafb;
      --green: #0b6b58;
      --green-2: #084e43;
      --blue: #1f5f99;
      --amber: #a96805;
      --red: #aa3c3c;
      --soft-green: #e3f3ef;
      --soft-blue: #e6f0f8;
      --soft-amber: #fff4db;
      --soft-red: #fff0f0;
      --shadow: 0 16px 40px rgba(18, 35, 49, 0.10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(11, 107, 88, 0.05) 1px, transparent 1px),
        linear-gradient(180deg, #f8fbfc 0%, var(--bg) 100%);
      background-size: 32px 32px, 100% 100%;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      font-size: 14px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .hidden { display: none !important; }

    .gate {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .gate-inner {
      width: min(980px, 100%);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .gate h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .gate-brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 12px;
      text-align: center;
    }

    .gate-logo {
      width: 132px;
      height: auto;
      flex: none;
      object-fit: contain;
    }

    .gate p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    .scope-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr));
      gap: 12px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 12px;
    }

    .scope-btn,
    .feature-btn {
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      text-align: left;
      padding: 14px;
      transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
    }

    .scope-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 5px;
      margin-top: 10px;
    }

    .scope-metric {
      min-height: 24px;
      padding: 4px 6px;
      border-radius: 6px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .scope-btn:hover,
    .feature-btn:hover {
      transform: translateY(-2px);
      border-color: rgba(11, 107, 88, 0.55);
      box-shadow: 0 12px 22px rgba(11, 107, 88, 0.12);
    }

    .scope-btn strong,
    .feature-btn strong {
      display: block;
      margin-bottom: 8px;
      font-size: 20px;
    }

    .scope-btn span,
    .feature-btn span {
      color: var(--muted);
      font-size: 12px;
    }

    .gate-actions {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .settings-panel {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 12px;
    }

    .link-settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(220px, 1fr));
      gap: 10px;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-logo {
      width: 86px;
      height: auto;
      flex: none;
      object-fit: contain;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
    }

    .brand .scope {
      min-width: 54px;
      padding: 5px 9px;
      border-radius: 999px;
      background: var(--soft-green);
      color: var(--green-2);
      font-weight: 700;
      text-align: center;
    }

    .statusbar {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .sync-status {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      min-height: 30px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
    }

    .pill.warning {
      background: var(--soft-amber);
      color: var(--amber);
      border-color: #f0d393;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(250px, 0.74fr) minmax(500px, 1.34fr) minmax(360px, 0.95fr);
      gap: 12px;
      padding: 12px;
      transition: grid-template-columns 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .workspace.focus-left {
      grid-template-columns: minmax(420px, 1.45fr) minmax(340px, 0.86fr) minmax(280px, 0.68fr);
    }

    .workspace.focus-middle {
      grid-template-columns: minmax(220px, 0.58fr) minmax(680px, 1.78fr) minmax(280px, 0.64fr);
    }

    .workspace.focus-right {
      grid-template-columns: minmax(220px, 0.56fr) minmax(340px, 0.82fr) minmax(650px, 1.72fr);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: minmax(260px, 0.7fr) minmax(420px, 1.3fr);
      gap: 12px;
      padding: 12px 12px 0;
    }

    .summary-card {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px 12px;
      overflow: hidden;
    }

    .summary-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      padding: 9px;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 20px;
    }

    .timeline {
      display: flex;
      gap: 8px;
      overflow: auto;
      padding-bottom: 2px;
    }

    .timeline-item {
      min-width: 230px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--panel-2);
      padding: 8px;
      cursor: pointer;
    }

    .timeline-item:hover {
      border-color: rgba(11, 107, 88, 0.55);
      background: #f6fffb;
    }

    .timeline-title {
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .work-detail {
      margin-top: 8px;
      padding: 8px;
      border-radius: 7px;
      background: rgba(255,255,255,0.82);
      border: 1px dashed var(--line);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .work-detail strong { color: var(--ink); }

    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      min-width: 0;
      transition: box-shadow 260ms ease, border-color 260ms ease, opacity 260ms ease, transform 260ms ease;
    }

    .workspace.focus-left .records-panel,
    .workspace.focus-middle .drafts-panel,
    .workspace.focus-right .ongoing-panel {
      border-color: rgba(11, 107, 88, 0.42);
      box-shadow: 0 18px 44px rgba(23, 37, 84, 0.15);
      transform: translateY(-1px);
    }

    .workspace.focus-left .drafts-panel,
    .workspace.focus-left .ongoing-panel,
    .workspace.focus-middle .records-panel,
    .workspace.focus-middle .ongoing-panel,
    .workspace.focus-right .records-panel,
    .workspace.focus-right .drafts-panel {
      opacity: 0.94;
    }

    .panel-head {
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
    }

    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .type-tabs {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .type-tab {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }

    .type-tab.active {
      border-color: var(--green);
      background: var(--soft-green);
      color: var(--green-2);
    }

    .inline-hint {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #c8dbea;
      border-radius: 7px;
      background: var(--soft-blue);
      color: var(--blue);
      font-size: 12px;
      line-height: 1.45;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      outline: none;
      padding: 8px 9px;
    }

    textarea {
      min-height: 36px;
      height: 36px;
      line-height: 1.35;
      resize: vertical;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(11, 107, 88, 0.58);
      box-shadow: 0 0 0 3px rgba(11, 107, 88, 0.10);
    }

    .btn {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
      font-weight: 700;
    }

    .btn.primary {
      border-color: var(--green);
      background: var(--green);
      color: #fff;
    }

    .btn.primary:hover { background: var(--green-2); }

    .btn.blue {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
    }

    .btn.danger {
      border-color: #efc7c7;
      background: var(--soft-red);
      color: var(--red);
    }

    .btn.ghost { background: var(--panel-2); }

    .icon-btn {
      width: 36px;
      min-width: 36px;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
    }

    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .record-list, .draft-list, .ongoing-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .record-card {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 10px;
      cursor: pointer;
      transition: border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }

    .record-card:hover {
      border-color: rgba(31, 95, 153, 0.55);
      background: #f8fbff;
      box-shadow: 0 8px 18px rgba(31, 95, 153, 0.08);
    }

    .record-card.selected {
      border-color: rgba(11, 107, 88, 0.72);
      background: var(--soft-green);
    }

    .record-card.disabled:not(.completed) {
      opacity: 0.72;
      cursor: pointer;
      background: #f5f7f8;
    }

    .record-card.completed {
      border-color: rgba(11, 107, 88, 0.42);
      background: linear-gradient(180deg, #ffffff 0%, #f0faf6 100%);
    }

    .record-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      font-weight: 800;
    }

    .record-meta {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .tag {
      flex: none;
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .tag.green { background: var(--soft-green); color: var(--green-2); }
    .tag.blue { background: var(--soft-blue); color: var(--blue); }
    .tag.amber { background: var(--soft-amber); color: var(--amber); }
    .tag.red { background: var(--soft-red); color: var(--red); }

    .draft-card, .ongoing-card {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      padding: 12px;
    }

    .draft-card.active {
      border-color: rgba(11, 107, 88, 0.5);
      box-shadow: inset 4px 0 0 var(--green);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px 10px;
    }

    .form-grid .wide { grid-column: 1 / -1; }

    .job-line {
      min-height: 28px;
      margin-top: 9px;
      padding: 6px 8px;
      border-radius: 7px;
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
    }

    .job-line.success { background: var(--soft-green); color: var(--green-2); }
    .job-line.failed { background: var(--soft-red); color: var(--red); }
    .job-line.busy { background: var(--soft-blue); color: var(--blue); }

    .empty {
      padding: 18px 12px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 7px;
      background: var(--panel-2);
    }

    details {
      margin-top: 8px;
    }

    summary {
      cursor: pointer;
      color: var(--blue);
      font-weight: 700;
      margin-bottom: 8px;
    }

    @media (max-width: 1240px) {
      .app { height: auto; min-height: 100vh; }
      .workspace,
      .workspace.focus-left,
      .workspace.focus-middle,
      .workspace.focus-right { grid-template-columns: 1fr; }
      .summary-strip { grid-template-columns: 1fr; }
      .panel { min-height: 420px; }
      .scope-grid { grid-template-columns: repeat(2, minmax(130px, 1fr)); }
    }

    @media (max-width: 620px) {
      .topbar { align-items: flex-start; flex-direction: column; }
      .gate-brand { flex-direction: column; gap: 10px; }
      .gate-logo { width: 118px; }
      .brand-logo { width: 76px; }
      .workspace { padding: 8px; gap: 8px; }
      .summary-strip { padding: 8px 8px 0; }
      .summary-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .form-grid { grid-template-columns: 1fr; }
      .scope-grid { grid-template-columns: 1fr; }
      .feature-grid { grid-template-columns: 1fr; }
      .link-settings { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <section id="gate" class="gate">
    <div class="gate-inner">
      <div class="gate-brand">
        <img class="gate-logo" src="/assets/vnet-logo.png" alt="世纪互联 VNET" />
        <h1 id="gateTitle">南通基地-运维灯塔工作台</h1>
      </div>
      <p id="gateDesc">选择需要进入的功能。</p>
      <div id="featureGrid" class="feature-grid"></div>
      <div id="scopeGrid" class="scope-grid hidden"></div>
      <div id="handoverSettings" class="settings-panel hidden"></div>
      <div id="gateActions" class="gate-actions"></div>
    </div>
  </section>

  <main id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <img class="brand-logo" src="/assets/vnet-logo.png" alt="世纪互联 VNET" />
        <h1>南通基地-运维灯塔工作台</h1>
        <span id="scopeLabel" class="scope">全部</span>
        <div class="sync-status">
          <span id="syncTime" class="pill">数据未加载</span>
          <span id="syncWarning" class="pill warning hidden"></span>
        </div>
      </div>
      <div class="statusbar">
        <span id="recordCount" class="pill">待发起 0</span>
        <span id="ongoingCount" class="pill">进行中 0</span>
        <button id="refreshBtn" class="btn ghost">刷新本页</button>
        <button id="syncSourceBtn" class="btn ghost">同步源表</button>
        <button id="switchScopeBtn" class="btn ghost">切换楼栋</button>
        <button id="homeBtn" class="btn ghost">功能选择</button>
      </div>
    </header>

    <section class="summary-strip">
      <div class="summary-card">
        <div class="record-title">
          <span>当日工作通告汇总</span>
          <span id="summaryDate" class="tag green">今日</span>
        </div>
        <div id="summaryMetrics" class="summary-metrics" style="margin-top:8px"></div>
      </div>
      <div class="summary-card">
        <div class="record-title">
          <span>今日闭环记录</span>
          <span id="summaryHint" class="tag blue">点击查看详情</span>
        </div>
        <div id="summaryTimeline" class="timeline" style="margin-top:8px"></div>
      </div>
    </section>

    <section id="workspace" class="workspace">
      <aside class="panel work-panel records-panel" data-workspace-zone="left">
        <div class="panel-head">
          <h2>待发起事项</h2>
          <button id="clearSelectionBtn" class="btn ghost">清空</button>
        </div>
        <div class="panel-body">
          <div class="filters">
            <div>
              <label>通告类型</label>
              <div id="workTypeTabs" class="type-tabs"></div>
              <div id="workTypeHint" class="inline-hint hidden"></div>
            </div>
            <div>
              <label for="monthSelect">计划维护月份</label>
              <select id="monthSelect"></select>
            </div>
            <div>
              <label for="specialtySelect">专业类别</label>
              <select id="specialtySelect"></select>
            </div>
            <div>
              <label for="searchInput">事项搜索</label>
              <input id="searchInput" type="search" placeholder="输入名称、编号、变更简述或维修名称" />
            </div>
          </div>
          <div id="recordList" class="record-list"></div>
        </div>
      </aside>

      <section class="panel work-panel drafts-panel" data-workspace-zone="middle">
        <div class="panel-head">
          <h2>待发起通告</h2>
          <button id="sendAllStartBtn" class="btn primary">一键发送全部开始通报并上传</button>
        </div>
        <div class="panel-body">
          <div id="draftList" class="draft-list"></div>
        </div>
      </section>

      <aside class="panel work-panel ongoing-panel" data-workspace-zone="right">
        <div class="panel-head">
          <h2>已开始未结束</h2>
          <button id="refreshOngoingBtn" class="btn ghost">刷新进行中</button>
        </div>
        <div class="panel-body">
          <div id="ongoingList" class="ongoing-list"></div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const urlScope = () => new URLSearchParams(window.location.search).get("scope") || "";
    const urlMode = () => new URLSearchParams(window.location.search).get("mode") || "";
    const state = {
      scope: urlScope(),
      gateMode: urlMode() || (urlScope() ? "maintenance" : "home"),
      scopeOptions: [
        { value: "110", label: "110站" },
        { value: "A", label: "A楼" },
        { value: "B", label: "B楼" },
        { value: "C", label: "C楼" },
        { value: "D", label: "D楼" },
        { value: "E", label: "E楼" },
        { value: "H", label: "H楼" },
        { value: "CAMPUS", label: "园区" },
        { value: "ALL", label: "全部" },
      ],
      records: [],
      ongoing: [],
      dailySummary: { date: "", items: [], stats: {} },
      handover: {
        scopeOptions: [],
        links: {},
        updatedAt: "",
        settingsPassword: "",
        authOpen: false,
        resetId: "",
        resetMessage: "",
      },
      handoverSettingsOpen: false,
      scopeOverview: {},
      lastLoadedAt: "",
      warnings: [],
      filters: { month: "", specialty: "", search: "" },
      workType: "maintenance",
      defaults: { impact: "对IT业务无影响，不会触发BA和BMS系统相关告警", progress: "准备工作已完成，人员已就位，可否开始操作？" },
      selected: new Set(),
      drafts: new Map(),
      jobStates: new Map(),
      actionOps: new Map(),
      jobToOpKey: new Map(),
      polling: new Set(),
      expandedRecordId: "",
      expandedSummaryKey: "",
    };

    const WORK_TYPES = [
      { value: "maintenance", label: "维保" },
      { value: "change", label: "变更" },
      { value: "repair", label: "检修" },
    ];
    const WORK_TYPE_VALUES = WORK_TYPES.map((item) => item.value);
    const JOB_STATE_TTL_MS = 24 * 60 * 60 * 1000;
    const JOB_STATE_LIMIT = 80;

    const $ = (id) => document.getElementById(id);
    const pad = (n) => String(n).padStart(2, "0");
    const todayInput = (h, m) => {
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(h)}:${pad(m)}`;
    };
    const dt = (value) => String(value || "").replace("T", " ");
    const opId = () => `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    const datePart = (value) => {
      const match = String(value || "").match(/\d{4}-\d{1,2}-\d{1,2}/);
      return match ? match[0] : "";
    };
    const dayLabel = (value) => {
      const day = datePart(value);
      if (!day) return "";
      const today = datePart(state.dailySummary?.date || "");
      return day === today ? "今日" : day.slice(5);
    };
    const opFor = (key) => {
      if (!state.actionOps.has(key)) state.actionOps.set(key, opId());
      return state.actionOps.get(key);
    };
    const scopeLabel = (value) => (state.scopeOptions.find((x) => x.value === value) || {}).label || value || "全部";
    const workTypeLabel = (value) => (WORK_TYPES.find((item) => item.value === value) || WORK_TYPES[0]).label;
    const recordKey = (record) => `${record.work_type || "maintenance"}:${record.record_id}`;
    const storageKey = () => `lan-workbench:${state.scope || "ALL"}`;
    const jobStorageKey = () => `lan-workbench-jobs:${state.scope || "ALL"}`;
    const safeJsonParse = (value, fallback) => {
      try { return JSON.parse(value); } catch { return fallback; }
    };

    function loadDraftState() {
      const saved = safeJsonParse(localStorage.getItem(storageKey()) || "{}", {});
      state.selected = new Set(Array.isArray(saved.selected) ? saved.selected : []);
      state.drafts = new Map(Object.entries(saved.drafts || {}));
    }

    function saveDraftState() {
      const drafts = {};
      for (const [key, value] of state.drafts.entries()) drafts[key] = value;
      localStorage.setItem(storageKey(), JSON.stringify({
        selected: Array.from(state.selected),
        drafts,
      }));
    }

    function loadJobState() {
      const saved = safeJsonParse(localStorage.getItem(jobStorageKey()) || "{}", {});
      const now = Date.now();
      const entries = Object.entries(saved.jobs || {})
        .filter(([, value]) => {
          const updatedAt = Date.parse(value?.updated_at || "");
          return Number.isFinite(updatedAt) && now - updatedAt <= JOB_STATE_TTL_MS;
        })
        .sort((a, b) => {
          const left = Date.parse(a[1]?.updated_at || "");
          const right = Date.parse(b[1]?.updated_at || "");
          return (Number.isFinite(right) ? right : 0) - (Number.isFinite(left) ? left : 0);
        })
        .slice(0, JOB_STATE_LIMIT);
      state.jobStates = new Map(entries);
      saveJobState();
    }

    function saveJobState() {
      const jobs = {};
      const entries = Array.from(state.jobStates.entries())
        .sort((a, b) => {
          const left = Date.parse(a[1]?.updated_at || "");
          const right = Date.parse(b[1]?.updated_at || "");
          return (Number.isFinite(right) ? right : 0) - (Number.isFinite(left) ? left : 0);
        })
        .slice(0, JOB_STATE_LIMIT);
      state.jobStates = new Map(entries);
      for (const [key, value] of entries) jobs[key] = value;
      localStorage.setItem(jobStorageKey(), JSON.stringify({ jobs }));
    }

    function jobLocalKey(payload, lineKey) {
      const workType = payload?.work_type || "maintenance";
      const action = payload?.action || "";
      const source = payload?.source_record_id || payload?.record_id || payload?.active_item_id || lineKey || "";
      return [state.scope || "ALL", workType, action, source].join(":");
    }

    function rememberJobState(localKey, patch) {
      const existing = state.jobStates.get(localKey) || {};
      state.jobStates.set(localKey, { ...existing, ...patch, updated_at: new Date().toISOString() });
      saveJobState();
    }

    function forgetJobState(localKey) {
      if (!localKey) return;
      state.jobStates.delete(localKey);
      saveJobState();
    }

    function forgetJobsForLine(lineKey) {
      for (const [key, value] of Array.from(state.jobStates.entries())) {
        if (value.line_key === lineKey) state.jobStates.delete(key);
      }
      saveJobState();
    }

    function cleanupDraftState() {
      const recordsByKey = new Map(state.records.map((record) => [recordKey(record), record]));
      const isUnavailable = (key) => {
        const record = recordsByKey.get(key);
        if (!record) return false;
        const summary = record.work_summary || {};
        return Boolean(summary.started_at) || isRecordOngoing(record);
      };
      for (const key of Array.from(state.selected)) {
        if (isUnavailable(key)) state.selected.delete(key);
      }
      for (const key of Array.from(state.drafts.keys())) {
        if (isUnavailable(key)) state.drafts.delete(key);
      }
      saveDraftState();
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      const payload = await res.json().catch(() => ({}));
      if (!res.ok || !payload.ok) throw new Error(payload.error || `请求失败 ${res.status}`);
      return payload.data;
    }

    function setSyncStatus(text, warnings = state.warnings) {
      $("syncTime").textContent = text || "数据未加载";
      const warning = (warnings || []).filter(Boolean)[0] || "";
      $("syncWarning").textContent = warning;
      $("syncWarning").classList.toggle("hidden", !warning);
    }

    function recordTypeCounts() {
      const initial = Object.fromEntries(WORK_TYPES.map((item) => [item.value, 0]));
      return state.records.reduce((counts, record) => {
        const summary = record.work_summary || {};
        if (summary.started_at || isRecordOngoing(record)) return counts;
        const type = record.work_type || "maintenance";
        if (Object.prototype.hasOwnProperty.call(counts, type)) counts[type] += 1;
        return counts;
      }, initial);
    }

    function ongoingTypeCounts() {
      const initial = Object.fromEntries(WORK_TYPES.map((item) => [item.value, 0]));
      return state.ongoing.reduce((counts, item) => {
        const type = item.work_type || "maintenance";
        if (Object.prototype.hasOwnProperty.call(counts, type)) counts[type] += 1;
        return counts;
      }, initial);
    }

    function splitTimeRange(text) {
      const raw = String(text || "");
      const parts = raw.split(/~|至|到/).map((x) => x.trim()).filter(Boolean);
      return { start: parts[0] || "", end: parts[1] || "" };
    }

    function html(text) {
      return String(text ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
      }[ch]));
    }

    function fieldsOf(record) {
      return record.display_fields || {};
    }

    function repairTitleForRecord(record) {
      const f = fieldsOf(record);
      return firstRepairField(record, ["事件描述"]) || f["维修名称"] || record.record_id;
    }

    function titleForRecord(record) {
      const f = fieldsOf(record);
      const type = record.work_type || "maintenance";
      if (type === "change") return f["变更简述"] || record.record_id;
      if (type === "repair") return repairTitleForRecord(record);
      return `EA118机房${f["楼栋"] || ""}${f["维护总项"] || ""}`;
    }

    function specialtyForRecord(record) {
      const f = fieldsOf(record);
      const type = record.work_type || "maintenance";
      if (type === "change") return f["专业"] || "";
      if (type === "repair") return f["所属专业"] || f["专业（推送消息用）"] || "";
      return f["专业类别"] || "";
    }

    function buildingForRecord(record) {
      const f = fieldsOf(record);
      const type = record.work_type || "maintenance";
      if (type === "change") return f["变更楼栋"] || "";
      if (type === "repair") return f["所属数据中心/楼栋-使用"] || f["所属数据中心/楼栋（关联CMDB唯一ID关联,DE不选）"] || "";
      return f["楼栋"] || "";
    }

    function levelForRecord(record) {
      const f = fieldsOf(record);
      if ((record.work_type || "maintenance") === "repair") {
        return repairLevelFromEventLevel(firstRepairField(record, ["对应事件等级"]));
      }
      return f["变更等级（阿里）"] || "";
    }

    function firstRepairField(record, names) {
      const f = fieldsOf(record);
      for (const name of names) {
        const value = String(f[name] || "").trim();
        if (value && !["-", "--", "—", "——", "/", "无", "暂无"].includes(value)) return value;
      }
      return "";
    }

    function repairLevelFromEventLevel(value) {
      const text = String(value || "").trim().toUpperCase();
      if (/(^|[^A-Z0-9])I3([^A-Z0-9]|$)/.test(text) || text === "低") return "低";
      if (/(^|[^A-Z0-9])I2([^A-Z0-9]|$)/.test(text) || text === "中") return "中";
      return "";
    }

    function repairDeviceText(record) {
      const f = fieldsOf(record);
      const deviceNo = String(f["设备编号"] || "").trim();
      const deviceName = String(f["设备名称"] || "").trim();
      if (deviceNo && deviceName) return `${deviceNo}${deviceName}`;
      if (deviceNo || deviceName) return deviceNo || deviceName;
      return firstRepairField(record, ["维修设备", "资产名称", "设备"]);
    }

    function isRecordOngoing(record) {
      const title = titleForRecord(record).replace(/\s+/g, "");
      const sourceId = record.source_record_id || record.record_id;
      return state.ongoing.some((item) => {
        if ((item.work_type || "maintenance") !== (record.work_type || "maintenance")) return false;
        if (sourceId && item.source_record_id && item.source_record_id === sourceId) return true;
        return String(item.title || "").replace(/\s+/g, "") === title;
      });
    }

    function repairDraftDefaults(record) {
      return {
        start_time: todayInput(23, 50),
        end_time: toDatetimeLocal(firstRepairField(record, ["故障发生时间", "发现故障时间"])) || "",
        location: "",
        content: titleForRecord(record),
        level: levelForRecord(record),
        specialty: specialtyForRecord(record),
        reason: firstRepairField(record, ["故障原因", "故障维修原因"]),
        impact: "",
        progress: "",
        repair_device: repairDeviceText(record),
        repair_fault: firstRepairField(record, ["维修故障", "故障维修原因"]),
        fault_type: firstRepairField(record, ["故障类型"]) || "设备故障",
        repair_mode: firstRepairField(record, ["维修方式", "维修方", "供应商名称"]),
        discovery: firstRepairField(record, ["对应来源"]),
        symptom: firstRepairField(record, ["故障发生现象描述", "故障现象"]),
        solution: firstRepairField(record, ["解决方案", "维修方案", "后续整改措施"]),
        job_id: "",
      };
    }

    function normalizeRepairDraft(record, draft) {
      const defaults = repairDraftDefaults(record);
      for (const [key, value] of Object.entries(defaults)) {
        if (draft[key] === undefined || draft[key] === null) draft[key] = value;
      }
      if (draft.location && [buildingForRecord(record), repairDeviceText(record)].filter(Boolean).join(" ") === draft.location) {
        draft.location = "";
      }
      if (draft.progress === state.defaults.progress) draft.progress = "";
      const f = fieldsOf(record);
      const sourceTitle = titleForRecord(record);
      if (!draft.content || (f["维修名称"] && draft.content === f["维修名称"])) {
        draft.content = sourceTitle;
      }
      const sourceLevel = levelForRecord(record);
      const rawEventLevel = firstRepairField(record, ["对应事件等级"]).toUpperCase();
      if (!draft.level || draft.level.toUpperCase() === rawEventLevel || ["I2", "I3"].includes(draft.level.toUpperCase())) {
        draft.level = sourceLevel;
      }
      const sourceDiscovery = firstRepairField(record, ["对应来源"]);
      if (!draft.discovery || draft.discovery === f["故障发现方式"] || draft.discovery === f["发现方式"]) {
        draft.discovery = sourceDiscovery;
      }
      return draft;
    }

    function getDraft(record) {
      const id = recordKey(record);
      if (!state.drafts.has(id)) {
        const memory = record.memory || {};
        const f = fieldsOf(record);
        const type = record.work_type || "maintenance";
        const isChange = type === "change";
        const isRepair = type === "repair";
        const draft = isRepair ? repairDraftDefaults(record) : {
          start_time: isChange
            ? (toDatetimeLocal(f["变更开始日期（阿里）"]) || todayInput(9, 30))
            : todayInput(9, 30),
          end_time: isChange
            ? (toDatetimeLocal(f["变更结束日期（阿里）"]) || todayInput(18, 30))
            : todayInput(18, 30),
          location: memory.location || "",
          content: isChange ? titleForRecord(record) : (memory.content || ""),
          reason: memory.reason || "",
          impact: memory.impact || state.defaults.impact,
          progress: state.defaults.progress,
          job_id: "",
        };
        state.drafts.set(id, draft);
        saveDraftState();
      }
      const draft = state.drafts.get(id);
      if ((record.work_type || "maintenance") === "repair") {
        normalizeRepairDraft(record, draft);
      }
      return draft;
    }

    function setJobLine(key, text, status = "") {
      const el = document.querySelector(`[data-job-line="${CSS.escape(key)}"]`);
      if (!el) return;
      el.className = `job-line ${status}`;
      el.textContent = text || "";
    }

    function setActionButtonsDisabled(lineKey, disabled) {
      document.querySelectorAll(
        `[data-send-start="${CSS.escape(lineKey)}"], [data-send-update="${CSS.escape(lineKey)}"], [data-send-end="${CSS.escape(lineKey)}"]`
      ).forEach((btn) => {
        btn.disabled = Boolean(disabled);
      });
    }

    function renderGate() {
      if (state.gateMode === "maintenance") return renderMaintenanceGate();
      if (state.gateMode === "handover") return renderHandoverGate();
      return renderFeatureGate();
    }

    function renderFeatureGate() {
      $("gateTitle").textContent = "南通基地-运维灯塔工作台";
      $("gateDesc").textContent = "选择需要进入的功能。";
      $("featureGrid").classList.remove("hidden");
      $("scopeGrid").classList.add("hidden");
      $("handoverSettings").classList.add("hidden");
      $("featureGrid").innerHTML = `
        <button class="feature-btn" data-feature="handover">
          <strong>各楼交接班相关</strong>
          <span>进入楼栋链接页，点击楼栋后打开已配置的交接班网页。</span>
        </button>
        <button class="feature-btn" data-feature="maintenance">
          <strong>维保变更检修相关</strong>
          <span>进入楼栋工作台，处理当天、待发起和未结束的维保、变更、检修通告。</span>
        </button>
      `;
      $("scopeGrid").innerHTML = "";
      $("gateActions").innerHTML = "";
      document.querySelectorAll("[data-feature]").forEach((btn) => {
        btn.addEventListener("click", () => showGate(btn.dataset.feature));
      });
    }

    function renderMaintenanceGate() {
      $("gateTitle").textContent = "维保变更检修相关";
      $("gateDesc").textContent = "选择楼栋或园区后进入对应工作台，页面内展示该范围的待发起和进行中通告。";
      $("featureGrid").classList.add("hidden");
      $("scopeGrid").classList.remove("hidden");
      $("handoverSettings").classList.add("hidden");
      $("scopeGrid").innerHTML = state.scopeOptions.map((item) => `
        <button class="scope-btn" data-scope="${item.value}">
          <strong>${html(item.label)}</strong>
          <span>${item.value === "ALL" ? "查看所有通告" : "只进入该范围工作台"}</span>
          ${scopeMetricHtml(item.value)}
        </button>
      `).join("");
      $("gateActions").innerHTML = `<button class="btn ghost" data-back-home>返回功能选择</button>`;
      document.querySelectorAll("[data-scope]").forEach((btn) => {
        btn.addEventListener("click", () => selectScope(btn.dataset.scope));
      });
      document.querySelector("[data-back-home]")?.addEventListener("click", () => showGate("home"));
    }

    function renderHandoverGate() {
      $("gateTitle").textContent = "各楼交接班相关";
      $("gateDesc").textContent = "选择楼栋后直接打开已配置的交接班网页链接。";
      $("featureGrid").classList.add("hidden");
      $("scopeGrid").classList.remove("hidden");
      const options = state.handover.scopeOptions.length
        ? state.handover.scopeOptions
        : state.scopeOptions.filter((item) => !["CAMPUS", "ALL"].includes(item.value));
      $("scopeGrid").innerHTML = options.map((item) => {
        const url = state.handover.links[item.value] || "";
        return `
          <button class="scope-btn" data-handover-scope="${html(item.value)}">
            <strong>${html(item.label)}</strong>
            <span>${url ? "打开交接班网页" : "未配置链接，请先在下方设置"}</span>
          </button>
        `;
      }).join("");
      $("gateActions").innerHTML = `
        <button class="btn ghost" data-back-home>返回功能选择</button>
        <button class="btn ghost icon-btn" data-toggle-handover-settings aria-label="交接班链接设置" title="交接班链接设置">&#9881;</button>
      `;
      renderHandoverSettings();
      document.querySelectorAll("[data-handover-scope]").forEach((btn) => {
        btn.addEventListener("click", () => openHandoverLink(btn.dataset.handoverScope));
      });
      document.querySelector("[data-back-home]")?.addEventListener("click", () => showGate("home"));
      document.querySelector("[data-toggle-handover-settings]")?.addEventListener("click", () => {
        if (state.handoverSettingsOpen || state.handover.authOpen || state.handover.resetId) {
          state.handoverSettingsOpen = false;
          state.handover.settingsPassword = "";
          state.handover.authOpen = false;
          state.handover.resetId = "";
          state.handover.resetMessage = "";
          renderGate();
          return;
        }
        state.handover.authOpen = true;
        renderGate();
      });
    }

    function renderHandoverSettings() {
      const panel = $("handoverSettings");
      const visible = state.handoverSettingsOpen || state.handover.authOpen || state.handover.resetId;
      panel.classList.toggle("hidden", !visible);
      if (!visible) {
        panel.innerHTML = "";
        return;
      }
      if (!state.handoverSettingsOpen) {
        panel.innerHTML = `
          <div class="record-title">
            <span>交接班链接设置验证</span>
            <span class="tag amber">需要密码</span>
          </div>
          <div class="form-grid" style="margin-top:10px">
            <div>
              <label for="handoverSettingsPassword">设置密码</label>
              <input id="handoverSettingsPassword" type="password" autocomplete="current-password" />
            </div>
            <div>
              <label>&nbsp;</label>
              <button class="btn primary" data-auth-handover-settings>进入设置</button>
            </div>
          </div>
          <div class="row-actions" style="margin-top:10px">
            <button class="btn ghost" data-request-handover-reset>忘记密码</button>
            <button class="btn ghost" data-cancel-handover-auth>取消</button>
          </div>
          ${state.handover.resetId ? `
            <div class="work-detail">
              ${html(state.handover.resetMessage || "验证码已发送，请输入验证码和新密码。")}
              <div class="form-grid" style="margin-top:10px">
                <div>
                  <label for="handoverResetCode">验证码</label>
                  <input id="handoverResetCode" inputmode="numeric" autocomplete="one-time-code" />
                </div>
                <div>
                  <label for="handoverNewPassword">新密码</label>
                  <input id="handoverNewPassword" type="password" autocomplete="new-password" />
                </div>
              </div>
              <div class="row-actions" style="margin-top:10px">
                <button class="btn blue" data-confirm-handover-reset>修改密码</button>
              </div>
            </div>
          ` : ""}
          <div id="handoverAuthLine" class="job-line">只有通过验证码或原密码验证后才能修改链接。</div>
        `;
        document.querySelector("[data-auth-handover-settings]")?.addEventListener("click", authenticateHandoverSettings);
        document.querySelector("[data-request-handover-reset]")?.addEventListener("click", requestHandoverPasswordReset);
        document.querySelector("[data-confirm-handover-reset]")?.addEventListener("click", confirmHandoverPasswordReset);
        document.querySelector("[data-cancel-handover-auth]")?.addEventListener("click", () => {
          state.handover.authOpen = false;
          state.handover.resetId = "";
          state.handover.resetMessage = "";
          state.handover.settingsPassword = "";
          renderGate();
        });
        return;
      }
      const options = state.handover.scopeOptions.length
        ? state.handover.scopeOptions
        : state.scopeOptions.filter((item) => !["CAMPUS", "ALL"].includes(item.value));
      panel.innerHTML = `
        <div class="record-title">
          <span>交接班链接配置</span>
          <span class="tag blue">${html(state.handover.updatedAt || "未保存")}</span>
        </div>
        <div class="link-settings" style="margin-top:10px">
          ${options.map((item) => `
            <div>
              <label for="handover-${html(item.value)}">${html(item.label)}</label>
              <input id="handover-${html(item.value)}" data-handover-link="${html(item.value)}" type="url" placeholder="https://..." value="${html(state.handover.links[item.value] || "")}" />
            </div>
          `).join("")}
        </div>
        <div class="row-actions" style="margin-top:12px">
          <button class="btn primary" data-save-handover-links>保存链接配置</button>
          <button class="btn ghost" data-close-handover-settings>收起</button>
        </div>
        <div id="handoverSaveLine" class="job-line">配置保存后，所有打开此页面的用户都会使用同一组链接。</div>
      `;
      document.querySelector("[data-save-handover-links]")?.addEventListener("click", saveHandoverLinks);
      document.querySelector("[data-close-handover-settings]")?.addEventListener("click", () => {
        state.handoverSettingsOpen = false;
        state.handover.settingsPassword = "";
        state.handover.authOpen = false;
        renderGate();
      });
    }

    async function authenticateHandoverSettings() {
      const password = $("handoverSettingsPassword")?.value || "";
      const line = $("handoverAuthLine");
      if (line) {
        line.className = "job-line busy";
        line.textContent = "正在验证密码";
      }
      try {
        await api("/api/handover-links-auth", {
          method: "POST",
          body: JSON.stringify({ password }),
        });
        state.handover.settingsPassword = password;
        state.handoverSettingsOpen = true;
        state.handover.authOpen = false;
        state.handover.resetId = "";
        state.handover.resetMessage = "";
        renderGate();
      } catch (err) {
        state.handoverSettingsOpen = false;
        state.handover.settingsPassword = "";
        if (line) {
          line.className = "job-line failed";
          line.textContent = err.message || "密码错误";
        }
      }
    }

    async function requestHandoverPasswordReset() {
      const line = $("handoverAuthLine");
      if (line) {
        line.className = "job-line busy";
        line.textContent = "正在发送验证码";
      }
      try {
        const data = await api("/api/handover-password-reset/request", {
          method: "POST",
          body: JSON.stringify({}),
        });
        state.handover.resetId = data.reset_id || "";
        state.handover.resetMessage = `验证码已发送给 ${data.recipients_count || 0} 位管理员，有效期至 ${data.expires_at || "-"}`;
        state.handover.authOpen = true;
        renderGate();
      } catch (err) {
        if (line) {
          line.className = "job-line failed";
          line.textContent = err.message || "验证码发送失败";
        }
      }
    }

    async function confirmHandoverPasswordReset() {
      const code = $("handoverResetCode")?.value || "";
      const newPassword = $("handoverNewPassword")?.value || "";
      const line = $("handoverAuthLine");
      if (line) {
        line.className = "job-line busy";
        line.textContent = "正在修改密码";
      }
      try {
        await api("/api/handover-password-reset/confirm", {
          method: "POST",
          body: JSON.stringify({
            reset_id: state.handover.resetId,
            code,
            new_password: newPassword,
          }),
        });
        state.handover.settingsPassword = newPassword;
        state.handoverSettingsOpen = true;
        state.handover.authOpen = false;
        state.handover.resetId = "";
        state.handover.resetMessage = "";
        renderGate();
      } catch (err) {
        if (line) {
          line.className = "job-line failed";
          line.textContent = err.message || "修改密码失败";
        }
      }
    }

    function showGate(mode, { replace = false } = {}) {
      state.gateMode = ["maintenance", "handover"].includes(mode) ? mode : "home";
      state.scope = "";
      const url = new URL(window.location.href);
      url.searchParams.delete("scope");
      if (state.gateMode === "home") url.searchParams.delete("mode");
      else url.searchParams.set("mode", state.gateMode);
      if (replace) window.history.replaceState({ mode: state.gateMode }, "", url);
      else window.history.pushState({ mode: state.gateMode }, "", url);
      $("app").classList.add("hidden");
      $("gate").classList.remove("hidden");
      renderGate();
      if (state.gateMode === "maintenance") loadScopeOverview();
      if (state.gateMode === "handover") loadHandoverLinks();
    }

    function scopeMetricHtml(scope) {
      const item = state.scopeOverview[scope] || {};
      const maintenance = item.maintenance_pending ?? "-";
      const change = item.change_pending ?? "-";
      const repair = item.repair_pending ?? "-";
      const ongoing = (
        Number(item.maintenance_ongoing || 0)
        + Number(item.change_ongoing || 0)
        + Number(item.repair_ongoing || 0)
      ) || 0;
      const closedToday = item.closed_today ?? "-";
      return `
        <div class="scope-metrics">
          <div class="scope-metric">维保 ${html(maintenance)}</div>
          <div class="scope-metric">变更 ${html(change)}</div>
          <div class="scope-metric">检修 ${html(repair)}</div>
          <div class="scope-metric">进行中 ${html(ongoing)}</div>
          <div class="scope-metric">今日完成 ${html(closedToday)}</div>
        </div>
      `;
    }

    async function loadScopeOverview() {
      try {
        const data = await api("/api/scope-overview");
        state.scopeOptions = data.scope_options || state.scopeOptions;
        state.scopeOverview = data.scopes || {};
        state.lastLoadedAt = data.last_loaded_at || state.lastLoadedAt;
        state.warnings = data.warnings || [];
        renderGate();
      } catch (err) {
        state.scopeOverview = {};
        renderGate();
      }
    }

    async function loadHandoverLinks() {
      try {
        const data = await api("/api/handover-links");
        state.handover.scopeOptions = data.scope_options || state.handover.scopeOptions || [];
        state.handover.links = data.links || {};
        state.handover.updatedAt = data.updated_at || "";
        renderGate();
      } catch (err) {
        state.handover.scopeOptions = state.handover.scopeOptions || [];
        renderGate();
      }
    }

    function openHandoverLink(scope) {
      const url = String(state.handover.links[scope] || "").trim();
      if (!url) {
        state.handover.authOpen = true;
        renderGate();
        const line = $("handoverAuthLine");
        if (line) {
          line.className = "job-line failed";
          line.textContent = "该楼栋尚未配置链接，请先验证设置密码后填写并保存。";
        }
        return;
      }
      window.open(url, "_blank", "noopener");
    }

    async function saveHandoverLinks() {
      const links = {};
      document.querySelectorAll("[data-handover-link]").forEach((input) => {
        links[input.dataset.handoverLink] = input.value || "";
      });
      const line = $("handoverSaveLine");
      if (line) {
        line.className = "job-line busy";
        line.textContent = "正在保存链接配置";
      }
      try {
        const data = await api("/api/handover-links", {
          method: "POST",
          body: JSON.stringify({ links, password: state.handover.settingsPassword || "" }),
        });
        state.handover.scopeOptions = data.scope_options || state.handover.scopeOptions;
        state.handover.links = data.links || {};
        state.handover.updatedAt = data.updated_at || "";
        state.handoverSettingsOpen = false;
        state.handover.settingsPassword = "";
        renderGate();
      } catch (err) {
        if (line) {
          line.className = "job-line failed";
          line.textContent = err.message || "保存失败";
        }
      }
    }

    async function selectScope(scope, { replace = false } = {}) {
      state.scope = scope || "ALL";
      const url = new URL(window.location.href);
      url.searchParams.set("scope", state.scope);
      url.searchParams.delete("mode");
      if (replace) window.history.replaceState({ scope: state.scope }, "", url);
      else window.history.pushState({ scope: state.scope }, "", url);
      $("gate").classList.add("hidden");
      $("app").classList.remove("hidden");
      await loadBootstrap();
    }

    async function loadBootstrap() {
      setSyncStatus("加载中", []);
      const data = await api(`/api/bootstrap?scope=${encodeURIComponent(state.scope)}`);
      state.scopeOptions = data.scope_options || state.scopeOptions;
      state.records = data.records || [];
      state.ongoing = data.ongoing || [];
      state.dailySummary = data.daily_summary || { date: "", items: [], stats: {} };
      state.defaults = data.defaults || state.defaults;
      state.lastLoadedAt = data.last_loaded_at || "";
      state.warnings = data.warnings || [];
      state.workType = WORK_TYPE_VALUES.includes(data.default_work_type)
        ? data.default_work_type
        : (WORK_TYPE_VALUES.includes(state.workType) ? state.workType : "maintenance");
      state.filters.month = state.filters.month || data.filters?.default_month || "";
      $("scopeLabel").textContent = data.scope_label || scopeLabel(state.scope);
      fillSelect("monthSelect", data.filters?.months || [], state.filters.month, false);
      fillSelect("specialtySelect", data.filters?.specialties || [], state.filters.specialty, true);
      setSyncStatus(data.last_loaded_at ? `数据更新时间 ${data.last_loaded_at}` : "已加载", state.warnings);
      loadDraftState();
      loadJobState();
      cleanupDraftState();
      render();
      restoreJobState();
    }

    function fillSelect(id, options, selected, includeAll) {
      const el = $(id);
      const opts = includeAll ? ["全部", ...options] : options;
      el.innerHTML = opts.map((x) => `<option value="${html(x)}">${html(x)}</option>`).join("");
      if (selected && opts.includes(selected)) el.value = selected;
      else if (opts.length) {
        el.value = opts[0];
        if (id === "monthSelect") state.filters.month = opts[0];
        if (id === "specialtySelect") state.filters.specialty = opts[0];
      }
    }

    async function refreshWorkbench() {
      const params = new URLSearchParams({
        scope: state.scope || "ALL",
        month: state.filters.month || "",
        specialty: state.filters.specialty === "全部" ? "" : state.filters.specialty,
      });
      setSyncStatus("刷新本页中", []);
      const data = await api(`/api/workbench?${params}`);
      state.records = data.records || [];
      state.ongoing = data.ongoing || [];
      state.dailySummary = data.daily_summary || { date: "", items: [], stats: {} };
      state.lastLoadedAt = data.last_loaded_at || state.lastLoadedAt;
      state.warnings = data.warnings || [];
      setSyncStatus(data.last_loaded_at ? `数据更新时间 ${data.last_loaded_at}` : "已刷新", state.warnings);
      cleanupDraftState();
      render();
      restoreJobState();
    }

    async function syncSource() {
      setSyncStatus("同步源表中", []);
      const data = await api(`/api/refresh?scope=${encodeURIComponent(state.scope || "ALL")}`);
      state.scopeOptions = data.scope_options || state.scopeOptions;
      state.records = data.records || [];
      state.ongoing = data.ongoing || [];
      state.dailySummary = data.daily_summary || { date: "", items: [], stats: {} };
      state.defaults = data.defaults || state.defaults;
      state.lastLoadedAt = data.last_loaded_at || "";
      state.warnings = data.warnings || [];
      setSyncStatus(data.last_loaded_at ? `数据更新时间 ${data.last_loaded_at}` : "已同步", state.warnings);
      cleanupDraftState();
      render();
      restoreJobState();
      loadScopeOverview();
    }

    function render() {
      renderWorkTypeTabs();
      renderSummary();
      renderRecords();
      renderDrafts();
      renderOngoing();
      const recordCounts = recordTypeCounts();
      const ongoingCounts = ongoingTypeCounts();
      $("recordCount").textContent = `待发起 ${WORK_TYPES.map((item) => `${item.label} ${recordCounts[item.value] || 0}`).join(" / ")}`;
      $("ongoingCount").textContent = `进行中 ${WORK_TYPES.map((item) => `${item.label} ${ongoingCounts[item.value] || 0}`).join(" / ")}`;
    }

    function renderWorkTypeTabs() {
      const counts = recordTypeCounts();
      $("workTypeTabs").innerHTML = WORK_TYPES.map((item) => `
        <button class="type-tab ${state.workType === item.value ? "active" : ""}" data-work-type="${item.value}">
          ${html(item.label)} ${html(counts[item.value] || 0)}
        </button>
      `).join("");
      document.querySelectorAll("[data-work-type]").forEach((btn) => {
        btn.addEventListener("click", () => setWorkType(btn.dataset.workType));
      });
      const otherType = WORK_TYPES
        .map((item) => item.value)
        .filter((type) => type !== state.workType)
        .sort((a, b) => (counts[b] || 0) - (counts[a] || 0))[0];
      const currentCount = counts[state.workType] || 0;
      const otherCount = counts[otherType] || 0;
      let hint = "";
      if (!currentCount && otherCount) {
        hint = `当前${workTypeLabel(state.workType)}没有待发起事项，${workTypeLabel(otherType)}有 ${otherCount} 条。`;
      }
      $("workTypeHint").textContent = hint;
      $("workTypeHint").classList.toggle("hidden", !hint);
    }

    function setWorkType(type) {
      type = WORK_TYPE_VALUES.includes(type) ? type : "maintenance";
      if (state.workType === type) return;
      saveDraftState();
      state.workType = type;
      loadDraftState();
      cleanupDraftState();
      render();
      restoreJobState();
    }

    function renderSummary() {
      const summary = state.dailySummary || {};
      const stats = summary.stats || {};
      $("summaryDate").textContent = summary.date || "今日";
      const metrics = [
        ["已发起", stats.started || 0, "green"],
        ["有更新", stats.updated || 0, "blue"],
        ["已结束", stats.ended || 0, "amber"],
        ["进行中", stats.ongoing || state.ongoing.length || 0, "red"],
      ];
      $("summaryMetrics").innerHTML = metrics.map(([label, value, color]) => `
        <div class="metric">
          <span class="tag ${color}">${html(label)}</span>
          <strong>${html(value)}</strong>
        </div>
      `).join("");
      const items = summary.items || [];
      if (!items.length) {
        $("summaryTimeline").innerHTML = `<div class="empty" style="min-width:100%">今天还没有通过网页完成的通告动作</div>`;
        return;
      }
      $("summaryTimeline").innerHTML = items.slice(0, 12).map((item) => {
        const key = item.key || item.fallback_key || item.title;
        const open = state.expandedSummaryKey === key;
        const actions = item.actions || [];
        return `
          <article class="timeline-item" data-summary-key="${html(key)}">
            <div class="timeline-title">${html(item.title || "未命名通告")}</div>
            <div class="record-meta">${html([workTypeLabel(item.work_type), item.building, item.specialty, item.status].filter(Boolean).join(" | "))}</div>
            <div class="record-meta">开始 ${html(item.started_at || "-")}；结束 ${html(item.ended_at || "-")}</div>
            ${open ? `<div class="work-detail">${summaryDetailHtml(item, actions)}</div>` : ""}
          </article>
        `;
      }).join("");
      document.querySelectorAll("[data-summary-key]").forEach((el) => {
        el.addEventListener("click", () => {
          state.expandedSummaryKey = state.expandedSummaryKey === el.dataset.summaryKey ? "" : el.dataset.summaryKey;
          renderSummary();
        });
      });
    }

    function summaryDetailHtml(item, actions) {
      const completedDate = item.completed_date || datePart(item.ended_at);
      const actionText = (actions || []).map((action) => {
        const line = `${action.time || "-"} ${action.label || action.action || ""}${action.progress ? "：" + action.progress : ""}`;
        return html(line);
      }).join("<br>");
      return `
        <strong>计划时间：</strong>${html(item.start_time || "-")} ~ ${html(item.end_time || "-")}<br>
        <strong>完成日期：</strong>${html(completedDate || "-")}<br>
        <strong>多维记录：</strong>${html(item.feishu_record_id || "-")}<br>
        <strong>位置：</strong>${html(item.location || "-")}<br>
        <strong>进度轨迹：</strong><br>${actionText || "-"}
      `;
    }

    function visibleRecords() {
      const q = state.filters.search.trim().toLowerCase();
      return state.records.filter((record) => {
        const f = fieldsOf(record);
        if ((record.work_type || "maintenance") !== state.workType) return false;
        const text = [
          titleForRecord(record),
          f["维护总项"] || "",
          f["维护编号"] || "",
          f["维护项目"] || "",
          f["变更简述"] || "",
          f["变更编码&描述"] || "",
          f["专业"] || "",
          f["维修名称"] || "",
          f["维修单号"] || "",
          f["设备名称"] || "",
          f["设备编号"] || "",
          f["故障维修原因"] || "",
          f["故障发生现象描述"] || "",
          f["维修进展描述"] || "",
          f["所属专业"] || "",
          f["专业（推送消息用）"] || "",
        ].join(" ").toLowerCase();
        return !q || text.includes(q);
      });
    }

    function recordMetaText(record) {
      const f = fieldsOf(record);
      const type = record.work_type || "maintenance";
      if (type === "change") {
        const start = f["变更开始日期（阿里）"] || "";
        const end = f["变更结束日期（阿里）"] || "";
        return [
          `楼栋 ${buildingForRecord(record) || "-"}`,
          `专业 ${specialtyForRecord(record) || "-"}`,
          `等级 ${levelForRecord(record) || "-"}`,
          `计划 ${start || "-"} ~ ${end || "-"}`,
          `进度 ${f["变更进度"] || "-"}`,
          `源ID ${record.source_record_id || record.record_id || "-"}`,
        ].join(" | ");
      }
      if (type === "repair") {
        const faultTime = firstRepairField(record, ["故障发生时间", "发现故障时间"]);
        const expectedTime = firstRepairField(record, ["期望完成时间", "维修结束时间", "维修结束时间（2026）"]);
        return [
          `楼栋 ${buildingForRecord(record) || "-"}`,
          `专业 ${specialtyForRecord(record) || "-"}`,
          `设备 ${repairDeviceText(record) || "-"}`,
          `故障 ${faultTime || "-"}`,
          `期望 ${expectedTime || "-"}`,
          `流程 ${f["流程"] || "-"}`,
          `源ID ${record.source_record_id || record.record_id || "-"}`,
        ].join(" | ");
      }
      return [
        buildingForRecord(record),
        specialtyForRecord(record),
        f["计划维护月份"],
        f["维护编号"],
        f["维护项目"],
      ].filter(Boolean).join(" | ");
    }

    function emptyRecordHtml() {
      const counts = recordTypeCounts();
      const otherType = WORK_TYPES
        .map((item) => item.value)
        .filter((type) => type !== state.workType)
        .sort((a, b) => (counts[b] || 0) - (counts[a] || 0))[0];
      const otherCount = counts[otherType] || 0;
      let message = "";
      if (state.workType === "change" && (state.scope || "ALL") === "CAMPUS") {
        message = "当前园区无多楼栋变更；单楼栋变更请进入对应楼栋或查看全部。";
      } else if (state.workType === "change") {
        message = "当前楼栋没有未开始变更。";
      } else if (state.workType === "repair") {
        message = "当前范围没有待发起检修事项；检修来源于“检修中与未开始”视图，且会排除无维修名称或无法识别楼栋的记录。";
      } else {
        message = "当前范围没有待发起维保事项，请检查计划维护月份或专业类别筛选。";
      }
      const switchButton = otherCount
        ? `<button class="btn blue" data-empty-switch-type="${html(otherType)}">查看${html(workTypeLabel(otherType))} ${html(otherCount)}</button>`
        : "";
      return `<div class="empty">${html(message)}${switchButton ? `<div style="margin-top:10px">${switchButton}</div>` : ""}</div>`;
    }

    function renderRecords() {
      const records = visibleRecords();
      if (!records.length) {
        $("recordList").innerHTML = emptyRecordHtml();
        document.querySelectorAll("[data-empty-switch-type]").forEach((btn) => {
          btn.addEventListener("click", () => setWorkType(btn.dataset.emptySwitchType));
        });
        return;
      }
      $("recordList").innerHTML = records.map((record) => {
        const f = fieldsOf(record);
        const key = recordKey(record);
        const selected = state.selected.has(key);
        const ongoing = isRecordOngoing(record);
        const summary = record.work_summary || {};
        const completed = summary.status === "已结束";
        const started = Boolean(summary.started_at);
        const disabled = ongoing || started;
        const expanded = state.expandedRecordId === record.record_id;
        const completedLabel = dayLabel(summary.completed_date || summary.ended_at);
        const startedLabel = dayLabel(summary.started_date || summary.started_at);
        const tagText = selected
          ? "已选择"
          : completed
            ? (completedLabel ? `${completedLabel}已完成` : "已完成")
            : ongoing
              ? "已开始"
              : started
                ? (startedLabel ? `${startedLabel}已开始` : "已开始")
                : "可发起";
        const tagClass = selected ? "green" : completed ? "green" : ongoing ? "amber" : started ? "amber" : "blue";
        return `
          <article class="record-card ${selected ? "selected" : ""} ${disabled ? "disabled" : ""} ${completed ? "completed" : ""}" data-record-key="${html(key)}">
            <div class="record-title">
              <span>${html(titleForRecord(record))}</span>
              <span class="tag ${tagClass}">${html(workTypeLabel(record.work_type))} · ${html(tagText)}</span>
            </div>
            <div class="record-meta">${html(recordMetaText(record))}</div>
            ${started ? `<div class="work-detail ${expanded ? "" : "hidden"}">${summaryDetailHtml(summary, summary.actions || [])}</div>` : ""}
          </article>
        `;
      }).join("");
      document.querySelectorAll("[data-record-key]").forEach((el) => {
        el.addEventListener("click", () => {
          const record = state.records.find((x) => recordKey(x) === el.dataset.recordKey);
          if (!record) return;
          const summary = record.work_summary || {};
          if (isRecordOngoing(record) || summary.started_at) {
            state.expandedRecordId = state.expandedRecordId === record.record_id ? "" : record.record_id;
            renderRecords();
            return;
          }
          const key = recordKey(record);
          if (state.selected.has(key)) state.selected.delete(key);
          else {
            state.selected.add(key);
            getDraft(record);
          }
          saveDraftState();
          render();
        });
      });
    }

    function draftFieldsHtml(record, id, draft) {
      if ((record.work_type || "maintenance") === "repair") {
        return `
          ${inputField(id, "start_time", "期望完成时间", draft.start_time, "datetime-local")}
          ${inputField(id, "end_time", "故障发生时间", draft.end_time, "datetime-local")}
          ${textField(id, "content", "标题", draft.content)}
          ${textField(id, "location", "地点", draft.location)}
          ${textField(id, "level", "紧急程度", draft.level)}
          ${textField(id, "specialty", "专业", draft.specialty)}
          ${textField(id, "repair_device", "维修设备", draft.repair_device)}
          ${textField(id, "repair_fault", "维修故障", draft.repair_fault)}
          ${textField(id, "fault_type", "故障类型", draft.fault_type)}
          ${textField(id, "repair_mode", "维修方式", draft.repair_mode)}
          <div class="wide">${textField(id, "impact", "影响范围", draft.impact)}</div>
          ${textField(id, "discovery", "故障发现方式", draft.discovery)}
          ${textField(id, "symptom", "故障现象", draft.symptom)}
          ${textField(id, "reason", "故障原因", draft.reason)}
          <div class="wide">${textField(id, "solution", "解决方案", draft.solution)}</div>
          <div class="wide">${textField(id, "progress", "完成情况", draft.progress)}</div>
        `;
      }
      return `
        ${inputField(id, "start_time", "开始时间", draft.start_time, "datetime-local")}
        ${inputField(id, "end_time", "结束时间", draft.end_time, "datetime-local")}
        ${textField(id, "location", "位置", draft.location)}
        ${textField(id, "content", "内容", draft.content)}
        ${textField(id, "reason", "原因", draft.reason)}
        ${textField(id, "impact", "影响", draft.impact)}
        <div class="wide">${textField(id, "progress", "进度", draft.progress)}</div>
      `;
    }

    function renderDrafts() {
      const selectedRecords = state.records.filter((r) => state.selected.has(recordKey(r)));
      if (!selectedRecords.length) {
        $("draftList").innerHTML = `<div class="empty">从左侧选择事项后，在这里填写开始通告字段</div>`;
        return;
      }
      $("draftList").innerHTML = selectedRecords.map((record) => {
        const f = fieldsOf(record);
        const draft = getDraft(record);
        const id = recordKey(record);
        const type = record.work_type || "maintenance";
        const extraMeta = type === "change"
          ? levelForRecord(record)
          : type === "repair"
            ? [repairDeviceText(record), f["流程"]].filter(Boolean).join(" | ")
            : f["计划维护月份"];
        return `
          <article class="draft-card active" data-draft-card="${html(id)}">
            <div class="card-head">
              <div>
                <h3 class="card-title">${html(titleForRecord(record))}</h3>
                <div class="record-meta">${html([workTypeLabel(record.work_type), buildingForRecord(record), specialtyForRecord(record), extraMeta].filter(Boolean).join(" | "))}</div>
              </div>
              <button class="btn danger" data-remove-draft="${html(id)}">移除</button>
            </div>
            <div class="form-grid">
              ${draftFieldsHtml(record, id, draft)}
            </div>
            <div class="row-actions" style="margin-top:10px">
              <button class="btn primary" data-send-start="${html(id)}">发送开始通报并上传</button>
            </div>
            <div class="job-line" data-job-line="${html(id)}">${draft.job_id ? "任务处理中" : "待发送至飞书并上传多维"}</div>
          </article>
        `;
      }).join("");
      bindDraftEvents();
    }

    function inputField(id, key, label, value, type = "text") {
      return `<div><label>${label}</label><input type="${type}" data-draft-field="${html(id)}:${key}" value="${html(value)}" /></div>`;
    }

    function textField(id, key, label, value) {
      return `<div><label>${label}</label><textarea data-draft-field="${html(id)}:${key}">${html(value)}</textarea></div>`;
    }

    function ongoingFieldsHtml(item, id, range) {
      if ((item.work_type || "maintenance") === "repair") {
        return `
          ${inputField(id, "expected_time", "期望完成时间", toDatetimeLocal(item.expected_time || range.end), "datetime-local")}
          ${inputField(id, "fault_time", "故障发生时间", toDatetimeLocal(item.fault_time), "datetime-local")}
          ${textField(id, "content", "标题", item.content || item.title || "")}
          ${textField(id, "level", "紧急程度", item.level || "")}
          ${textField(id, "specialty", "专业", item.specialty || "")}
          ${textField(id, "repair_device", "维修设备", item.repair_device || "")}
          ${textField(id, "repair_fault", "维修故障", item.repair_fault || "")}
          ${textField(id, "fault_type", "故障类型", item.fault_type || "设备故障")}
          ${textField(id, "repair_mode", "维修方式", item.repair_mode || "")}
          <div class="wide">${textField(id, "impact", "影响范围", item.impact || "")}</div>
          ${textField(id, "discovery", "故障发现方式", item.discovery || "")}
          ${textField(id, "symptom", "故障现象", item.symptom || "")}
          ${textField(id, "reason", "故障原因", item.reason || "")}
          <div class="wide">${textField(id, "solution", "解决方案", item.solution || "")}</div>
        `;
      }
      return `
        ${inputField(id, "start_time", "开始时间", toDatetimeLocal(range.start), "datetime-local")}
        ${inputField(id, "end_time", "结束时间", toDatetimeLocal(range.end), "datetime-local")}
        ${textField(id, "content", "内容", item.content || "")}
        ${textField(id, "reason", "原因", item.reason || "")}
        ${textField(id, "impact", "影响", item.impact || state.defaults.impact)}
      `;
    }

    function bindDraftEvents() {
      document.querySelectorAll("[data-draft-field]").forEach((el) => {
        el.addEventListener("input", () => {
          const marker = el.dataset.draftField.lastIndexOf(":");
          const id = el.dataset.draftField.slice(0, marker);
          const key = el.dataset.draftField.slice(marker + 1);
          const draft = state.drafts.get(id);
          if (draft) {
            draft[key] = el.value;
            draft.job_id = "";
            draft.operation_id = "";
            state.actionOps.delete(`${id}:start`);
            forgetJobsForLine(id);
            setActionButtonsDisabled(id, false);
            saveDraftState();
            const line = document.querySelector(`[data-job-line="${CSS.escape(id)}"]`);
            if (line) {
              line.className = "job-line";
              line.textContent = "内容已修改，请重新发送";
            }
          }
        });
      });
      document.querySelectorAll("[data-remove-draft]").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.selected.delete(btn.dataset.removeDraft);
          state.drafts.delete(btn.dataset.removeDraft);
          saveDraftState();
          render();
        });
      });
      document.querySelectorAll("[data-send-start]").forEach((btn) => {
        btn.addEventListener("click", () => sendStart(btn.dataset.sendStart));
      });
    }

    function renderOngoing() {
      if (!state.ongoing.length) {
        $("ongoingList").innerHTML = `<div class="empty">当前楼栋没有已开始未结束通告</div>`;
        return;
      }
      $("ongoingList").innerHTML = state.ongoing.map((item) => {
        const id = item.active_item_id;
        const range = splitTimeRange(item.time);
        const readonly = Boolean(item.source_only);
        const readonlyReason = `该${workTypeLabel(item.work_type)}来自源表进行中，但本地没有目标表 record_id，不能通过网页更新或结束。`;
        const tagText = readonly ? "源表进行中 / 未绑定目标记录 / 只读" : (item.can_update ? "可操作" : "等待");
        const isRepair = (item.work_type || "maintenance") === "repair";
        return `
          <article class="ongoing-card" data-ongoing="${html(id)}">
            <div class="card-head">
              <div>
                <h3 class="card-title">${html(item.title || "未命名通告")}</h3>
                <div class="record-meta">${html([workTypeLabel(item.work_type), item.building, item.specialty, item.level, item.time, item.upload_state, item.source_record_id ? "源ID " + item.source_record_id : ""].filter(Boolean).join(" | "))}</div>
              </div>
              <span class="tag ${item.can_update ? "green" : "amber"}">${html(tagText)}</span>
            </div>
            <div class="form-grid ${readonly ? "hidden" : ""}">
              <div>${textField(id, "progress", isRepair ? "完成情况" : "进度", item.progress || "")}</div>
              <div>${textField(id, "location", isRepair ? "地点" : "位置", item.location || "")}</div>
            </div>
            <details class="${readonly ? "hidden" : ""}">
              <summary>编辑完整通告字段</summary>
              <div class="form-grid">
                ${ongoingFieldsHtml(item, id, range)}
              </div>
            </details>
            ${readonly ? `<div class="job-line failed">${html(readonlyReason)}</div>` : (item.block_reason ? `<div class="job-line failed">${html(item.block_reason)}</div>` : "")}
            <div class="row-actions ${readonly ? "hidden" : ""}" style="margin-top:10px">
              <button class="btn blue" data-send-update="${html(id)}" ${item.can_update ? "" : "disabled"}>发送更新并上传</button>
              <button class="btn danger" data-send-end="${html(id)}" ${item.can_end ? "" : "disabled"}>发送结束并上传</button>
            </div>
            <div class="job-line ${readonly ? "hidden" : ""}" data-job-line="${html(id)}">待操作</div>
          </article>
        `;
      }).join("");
      bindOngoingEvents();
    }

    function toDatetimeLocal(text) {
      const normalized = String(text || "").trim().replace(/\//g, "-").replace(" ", "T");
      if (/^\d{4}-\d{1,2}-\d{1,2}T\d{1,2}:\d{2}/.test(normalized)) {
        const [date, time] = normalized.split("T");
        const [y, m, d] = date.split("-").map((x) => pad(x));
        return `${y}-${m}-${d}T${time.slice(0, 5)}`;
      }
      return "";
    }

    function readOngoingPayload(activeItemId, action) {
      const item = state.ongoing.find((x) => x.active_item_id === activeItemId);
      const card = document.querySelector(`[data-ongoing="${CSS.escape(activeItemId)}"]`);
      const field = (key) => card?.querySelector(`[data-draft-field="${CSS.escape(activeItemId + ":" + key)}"]`);
      const read = (key, fallback = "") => {
        const el = field(key);
        return el ? el.value : fallback;
      };
      const range = splitTimeRange(item?.time || "");
      const isRepair = (item?.work_type || "maintenance") === "repair";
      const expectedTime = read("expected_time", item?.expected_time || range.end || "");
      const faultTime = read("fault_time", item?.fault_time || range.start || "");
      return {
        action,
        scope: state.scope,
        work_type: item?.work_type || "maintenance",
        notice_type: item?.notice_type || "",
        record_id: item?.record_id || "",
        target_record_id: item?.target_record_id || item?.record_id || "",
        source_record_id: item?.source_record_id || "",
        source_app_token: item?.source_app_token || "",
        source_table_id: item?.source_table_id || "",
        specialty: isRepair
          ? read("specialty", item?.specialty || "")
          : (state.filters.specialty === "全部" ? (item?.specialty || "") : state.filters.specialty),
        active_item_id: activeItemId,
        title: isRepair ? (read("content", item?.title || "") || item?.title || "") : (item?.title || ""),
        building: item?.building || "",
        building_codes: item?.building_codes || [],
        level: isRepair ? read("level", item?.level || "") : (item?.level || ""),
        source_progress: item?.source_progress || "",
        start_time: isRepair ? expectedTime : read("start_time", range.start),
        end_time: isRepair ? faultTime : read("end_time", range.end),
        location: read("location", item?.location || ""),
        content: read("content", item?.content || ""),
        reason: read("reason", item?.reason || ""),
        impact: isRepair ? read("impact", item?.impact || "") : read("impact", item?.impact || state.defaults.impact),
        progress: read("progress", item?.progress || ""),
        repair_device: isRepair ? read("repair_device", item?.repair_device || "") : (item?.repair_device || ""),
        repair_fault: isRepair ? read("repair_fault", item?.repair_fault || item?.reason || "") : (item?.repair_fault || item?.reason || ""),
        fault_type: isRepair ? read("fault_type", item?.fault_type || "设备故障") : (item?.fault_type || "设备故障"),
        repair_mode: isRepair ? read("repair_mode", item?.repair_mode || "") : (item?.repair_mode || ""),
        discovery: isRepair ? read("discovery", item?.discovery || "") : (item?.discovery || ""),
        symptom: isRepair ? read("symptom", item?.symptom || "") : (item?.symptom || ""),
        solution: isRepair ? read("solution", item?.solution || "") : (item?.solution || ""),
        fault_time: isRepair ? faultTime : (item?.fault_time || ""),
        expected_time: isRepair ? expectedTime : (item?.expected_time || ""),
        operation_id: opFor(`${activeItemId}:${action}`),
      };
    }

    function bindOngoingEvents() {
      document.querySelectorAll(".ongoing-card [data-draft-field]").forEach((el) => {
        el.addEventListener("input", () => {
          const [id] = el.dataset.draftField.split(":");
          state.actionOps.delete(`${id}:update`);
          state.actionOps.delete(`${id}:end`);
          forgetJobsForLine(id);
          setActionButtonsDisabled(id, false);
          const line = document.querySelector(`[data-job-line="${CSS.escape(id)}"]`);
          if (line) {
            line.className = "job-line";
            line.textContent = "内容已修改，请重新发送";
          }
        });
      });
      document.querySelectorAll("[data-send-update]").forEach((btn) => {
        btn.addEventListener("click", () => sendAction(readOngoingPayload(btn.dataset.sendUpdate, "update"), btn.dataset.sendUpdate));
      });
      document.querySelectorAll("[data-send-end]").forEach((btn) => {
        btn.addEventListener("click", () => sendAction(readOngoingPayload(btn.dataset.sendEnd, "end"), btn.dataset.sendEnd));
      });
    }

    async function sendStart(recordId) {
      const record = state.records.find((x) => recordKey(x) === recordId);
      const draft = state.drafts.get(recordId);
      if (!record || !draft) return;
      const type = record.work_type || "maintenance";
      const draftSpecialty = String(draft.specialty || "").trim();
      const recordSpecialty = String((type === "repair" && draftSpecialty) ? draftSpecialty : specialtyForRecord(record) || "").trim();
      const uploadSpecialty = type === "repair"
        ? recordSpecialty
        : state.filters.specialty && state.filters.specialty !== "全部"
        ? state.filters.specialty
        : recordSpecialty;
      if (!uploadSpecialty || uploadSpecialty === "全部") {
        setJobLine(recordId, "该事项缺少专业类别，无法上传", "failed");
        return;
      }
      await sendAction({
        action: "start",
        scope: state.scope,
        work_type: record.work_type || "maintenance",
        notice_type: record.notice_type || "",
        source_app_token: record.source_app_token || "",

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>维护计划模板生成</title>
  <style>
    :root {
      --bg: #f4f7f9;
      --surface: #ffffff;
      --surface-2: #f8fbfc;
      --text: #14263a;
      --muted: #657689;
      --line: #d8e1e8;
      --accent: #0c6b5f;
      --accent-2: #084d45;
      --accent-soft: #e2f3f0;
      --warning: #b26a00;
      --warning-soft: #fff4dd;
      --danger: #a13f3f;
      --danger-soft: #fff1f1;
      --shadow: 0 14px 34px rgba(20, 38, 58, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      color: var(--text);
      background: linear-gradient(180deg, #f7fafb 0%, var(--bg) 100%);
      font-family: "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    button, input, select, textarea { font: inherit; }

    button {
      cursor: pointer;
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: 58px minmax(0, 1fr);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(8px);
    }

    .title {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
    }

    .source {
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .statusbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 5px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .pill strong {
      color: var(--text);
      font-weight: 700;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 250px 360px minmax(560px, 1fr);
      gap: 12px;
      padding: 12px;
    }

    .panel {
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }

    .panel-head h2 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
    }

    .panel-body {
      min-height: 0;
      overflow: auto;
      padding: 12px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--text);
      padding: 9px 10px;
      outline: none;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
      line-height: 1.55;
    }

    .draft-body textarea {
      min-height: 38px;
      height: 38px;
      line-height: 1.35;
    }

    input:focus, select:focus, textarea:focus {
      border-color: rgba(12, 107, 95, 0.55);
      box-shadow: 0 0 0 3px rgba(12, 107, 95, 0.10);
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      min-height: 38px;
      padding: 8px 11px;
      border-radius: 7px;
      border: 1px solid transparent;
      font-weight: 700;
      color: var(--text);
      background: #fff;
    }

    .btn.primary {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .btn.primary:hover { background: var(--accent-2); }

    .btn.secondary {
      border-color: var(--line);
      background: var(--surface-2);
    }

    .btn.danger {
      color: var(--danger);
      border-color: #f0caca;
      background: var(--danger-soft);
    }

    .records {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .record-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      cursor: pointer;
      transition: border-color 0.14s ease, background 0.14s ease, box-shadow 0.14s ease;
    }

    .record-row:hover {
      border-color: rgba(12, 107, 95, 0.55);
      background: #f7fcfb;
      box-shadow: 0 8px 18px rgba(12, 107, 95, 0.08);
    }

    .record-row.selected {
      border-color: rgba(12, 107, 95, 0.65);
      background: var(--accent-soft);
    }

    .record-row.drafted {
      border-color: rgba(178, 106, 0, 0.55);
      background: var(--warning-soft);
    }

    .record-row input {
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    .record-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .state-chip {
      min-width: 42px;
      border-radius: 999px;
      padding: 4px 8px;
      text-align: center;
      color: var(--muted);
      background: var(--surface-2);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .record-row.selected .state-chip {
      color: var(--accent-2);
      background: #d4ece8;
      border-color: rgba(12, 107, 95, 0.30);
    }

    .record-row.drafted .state-chip {
      color: var(--warning);
      background: #ffe7b5;
      border-color: rgba(178, 106, 0, 0.28);
    }

    .link-btn {
      border: none;
      background: transparent;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 6px;
    }

    .queue {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .draft {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      overflow: hidden;
    }

    .draft-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 10px;
      padding: 10px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: #f8fcfb;
      cursor: pointer;
      transition: background 0.14s ease, box-shadow 0.14s ease;
    }

    .draft-head:hover {
      background: #eef8f6;
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .draft.open .draft-head {
      border-bottom-color: var(--line);
      background: #e7f5f2;
    }

    .draft-name {
      font-weight: 700;
      line-height: 1.45;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .draft-hint {
      color: var(--accent-2);
      background: var(--accent-soft);
      border: 1px solid rgba(12, 107, 95, 0.24);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .draft-body {
      display: none;
      padding: 12px;
    }

    .draft.open .draft-body { display: block; }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .full { grid-column: 1 / -1; }

    .result {
      min-height: 110px;
      white-space: pre-wrap;
      line-height: 1.65;
      font-size: 13px;
      border: 1px dashed var(--line);
      background: var(--surface-2);
      border-radius: 7px;
      padding: 10px;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.6;
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 100;
      background: rgba(11, 24, 35, 0.32);
      padding: 28px;
    }

    .modal.open {
      display: grid;
      place-items: center;
    }

    .modal-card {
      width: min(920px, 100%);
      max-height: min(760px, calc(100vh - 56px));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h3 {
      margin: 0;
      font-size: 15px;
    }

    .field-grid {
      overflow: auto;
      padding: 14px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field-cell {
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface-2);
      padding: 9px 10px;
    }

    .field-key {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .field-value {
      font-size: 13px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 1280px) {
      .workspace {
        grid-template-columns: 250px minmax(0, 1fr);
      }
      .workspace .panel:last-child {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 860px) {
      .app { height: auto; min-height: 100vh; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .workspace { grid-template-columns: 1fr; }
      .two-col, .field-grid { grid-template-columns: 1fr; }
      .modal { padding: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title">
        <h1>维护计划模板生成</h1>
        <span class="source" id="sourceInfo"></span>
      </div>
      <div class="statusbar">
        <span class="pill"><strong>维护实施状态</strong><span id="statusFilter">未开始</span></span>
        <span class="pill"><strong id="visibleCount">0</strong> 可选</span>
        <span class="pill"><strong id="selectedCount">0</strong> 已选</span>
        <span class="pill"><strong id="draftCount">0</strong> 待生成</span>
      </div>
    </header>

    <main class="workspace">
      <section class="panel">
        <div class="panel-head"><h2>筛选</h2></div>
        <div class="panel-body">
          <div class="field">
            <label for="monthSelect">计划维护月份</label>
            <select id="monthSelect"></select>
          </div>
          <div class="field">
            <label for="specialtySelect">专业类别</label>
            <select id="specialtySelect"></select>
          </div>
          <div class="field">
            <label for="buildingSelect">楼栋</label>
            <select id="buildingSelect"></select>
          </div>
          <div class="field">
            <label for="maintenanceSearch">维护总项</label>
            <input id="maintenanceSearch" placeholder="搜索维护总项" />
          </div>
          <div class="button-row">
            <button id="selectAllButton" type="button" class="btn secondary">全选当前</button>
            <button id="clearSelectionButton" type="button" class="btn secondary">清空</button>
            <button id="refreshButton" type="button" class="btn secondary">刷新</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>维护总项</h2>
          <button id="addDraftsButton" type="button" class="btn primary">加入待生成</button>
        </div>
        <div class="panel-body">
          <div id="recordsList" class="records"></div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>待生成</h2>
          <div class="button-row">
            <button id="generateAllButton" type="button" class="btn primary">生成</button>
            <button id="copyAllButton" type="button" class="btn secondary">复制</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="draftList" class="queue"></div>
          <div class="field" style="margin-top:12px;margin-bottom:0;">
            <label>生成结果</label>
            <div id="combinedOutput" class="result"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="detailModal" class="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="detailTitle">记录详情</h3>
        <button id="closeDetailButton" type="button" class="btn secondary">关闭</button>
      </div>
      <div id="detailFields" class="field-grid"></div>
    </div>
  </div>

  <script>
    const state = {
      bootstrap: null,
      records: [],
      maintenanceOptions: [],
      visibleMaintenanceOptions: [],
      selectedIds: new Set(),
      drafts: [],
      openDraftId: '',
    };

    const el = {
      sourceInfo: document.getElementById('sourceInfo'),
      statusFilter: document.getElementById('statusFilter'),
      visibleCount: document.getElementById('visibleCount'),
      selectedCount: document.getElementById('selectedCount'),
      draftCount: document.getElementById('draftCount'),
      monthSelect: document.getElementById('monthSelect'),
      specialtySelect: document.getElementById('specialtySelect'),
      buildingSelect: document.getElementById('buildingSelect'),
      maintenanceSearch: document.getElementById('maintenanceSearch'),
      selectAllButton: document.getElementById('selectAllButton'),
      clearSelectionButton: document.getElementById('clearSelectionButton'),
      refreshButton: document.getElementById('refreshButton'),
      recordsList: document.getElementById('recordsList'),
      addDraftsButton: document.getElementById('addDraftsButton'),
      draftList: document.getElementById('draftList'),
      generateAllButton: document.getElementById('generateAllButton'),
      copyAllButton: document.getElementById('copyAllButton'),
      combinedOutput: document.getElementById('combinedOutput'),
      detailModal: document.getElementById('detailModal'),
      detailTitle: document.getElementById('detailTitle'),
      detailFields: document.getElementById('detailFields'),
      closeDetailButton: document.getElementById('closeDetailButton'),
    };

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function apiGet(url) {
      const response = await fetch(url);
      const payload = await response.json();
      if (!payload.ok) throw new Error(payload.error || '请求失败');
      return payload.data;
    }

    async function apiPost(url, body) {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const payload = await response.json();
      if (!payload.ok) throw new Error(payload.error || '提交失败');
      return payload.data;
    }

    function fillSelect(select, values, withAll = true) {
      select.innerHTML = '';
      if (withAll) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = '全部';
        select.appendChild(option);
      }
      values.forEach((value) => {
        const option = document.createElement('option');
        option.value = value;
        option.textContent = value;
        select.appendChild(option);
      });
    }

    function updateCounters() {
      el.visibleCount.textContent = String(state.visibleMaintenanceOptions.length);
      const selectedIds = new Set([...state.selectedIds, ...getDraftIdSet()]);
      el.selectedCount.textContent = String(selectedIds.size);
      el.draftCount.textContent = String(state.drafts.length);
    }

    function getDraftIdSet() {
      return new Set(state.drafts.map((draft) => draft.record_id));
    }

    function isDrafted(recordId) {
      return getDraftIdSet().has(recordId);
    }

    function isRecordSelected(recordId) {
      return state.selectedIds.has(recordId) || isDrafted(recordId);
    }

    function getVisibleMaintenanceOptions() {
      const keyword = el.maintenanceSearch.value.trim();
      return state.maintenanceOptions.filter((item) => {
        if (!keyword) return true;
        return item.label.includes(keyword);
      });
    }

    function toggleRecord(recordId) {
      if (isDrafted(recordId)) {
        state.selectedIds.add(recordId);
        renderRecords();
        return;
      }
      if (state.selectedIds.has(recordId)) state.selectedIds.delete(recordId);
      else state.selectedIds.add(recordId);
      renderRecords();
    }

    function renderRecords() {
      state.visibleMaintenanceOptions = getVisibleMaintenanceOptions();
      el.recordsList.innerHTML = '';
      if (!state.visibleMaintenanceOptions.length) {
        el.recordsList.innerHTML = '<div class="empty">没有符合条件的维护总项。</div>';
        updateCounters();
        return;
      }

      state.visibleMaintenanceOptions.forEach((item) => {
        const selected = isRecordSelected(item.record_id);
        const drafted = isDrafted(item.record_id);
        const statusText = drafted ? '待生成' : (selected ? '已选' : '可选');
        const row = document.createElement('div');
        row.className = `record-row${selected ? ' selected' : ''}${drafted ? ' drafted' : ''}`;
        row.innerHTML = `
          <input type="checkbox" ${selected ? 'checked' : ''} />
          <div class="record-title">${escapeHtml(item.label)}</div>
          <span class="state-chip">${escapeHtml(statusText)}</span>
          <button type="button" class="link-btn">详情</button>
        `;
        row.addEventListener('click', () => toggleRecord(item.record_id));
        row.querySelector('.link-btn').addEventListener('click', (event) => {
          event.stopPropagation();
          showRecordDetail(item.record_id);
        });
        el.recordsList.appendChild(row);
      });
      updateCounters();
    }

    function findRecord(recordId) {
      return state.records.find((record) => record.record_id === recordId);
    }

    function showRecordDetail(recordId) {
      const record = findRecord(recordId);
      if (!record) return;
      const fields = record.display_fields || {};
      el.detailTitle.textContent = '记录详情';
      el.detailFields.innerHTML = (state.bootstrap.field_order || [])
        .map((field) => `
          <div class="field-cell">
            <div class="field-key">${escapeHtml(field)}</div>
            <div class="field-value">${escapeHtml(fields[field] || '')}</div>
          </div>
        `).join('');
      el.detailModal.classList.add('open');
      el.detailModal.setAttribute('aria-hidden', 'false');
    }

    function closeDetail() {
      el.detailModal.classList.remove('open');
      el.detailModal.setAttribute('aria-hidden', 'true');
    }

    function defaultDateTimeLocal(hour, minute) {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, '0');
      const dd = String(now.getDate()).padStart(2, '0');
      const hh = String(hour).padStart(2, '0');
      const mi = String(minute).padStart(2, '0');
      return `${yyyy}-${mm}-${dd}T${hh}:${mi}`;
    }

    function buildDraft(record) {
      const fields = record.display_fields || {};
      return {
        record_id: record.record_id,
        title: `EA118机房${fields['楼栋'] || ''}${fields['维护总项'] || ''}`,
        maintenance: fields['维护总项'] || '',
        location: '',
        content: '',
        reason: '',
        start_time: defaultDateTimeLocal(9, 30),
        end_time: defaultDateTimeLocal(18, 30),
        impact: state.bootstrap.defaults.impact,
        preview: '',
      };
    }

    function addDrafts() {
      const records = state.records.filter((record) => isRecordSelected(record.record_id));
      if (!records.length) {
        alert('请先选择维护总项。');
        return;
      }
      records.forEach((record) => {
        if (!state.drafts.find((draft) => draft.record_id === record.record_id)) {
          state.drafts.push(buildDraft(record));
        }
        state.selectedIds.add(record.record_id);
      });
      if (!state.openDraftId && state.drafts[0]) state.openDraftId = state.drafts[0].record_id;
      renderDrafts();
      renderRecords();
    }

    function toggleDraft(recordId) {
      state.openDraftId = state.openDraftId === recordId ? '' : recordId;
      renderDrafts();
    }

    function renderDrafts() {
      el.draftList.innerHTML = '';
      if (!state.drafts.length) {
        el.draftList.innerHTML = '<div class="empty">未加入待生成记录。</div>';
        renderCombinedOutput();
        updateCounters();
        return;
      }

      state.drafts.forEach((draft) => {
        const open = state.openDraftId === draft.record_id;
        const card = document.createElement('article');
        card.className = `draft${open ? ' open' : ''}`;
        card.innerHTML = `
          <div class="draft-head">
            <div class="draft-name">${escapeHtml(draft.title)}</div>
            <span class="draft-hint">${open ? '收起' : '展开填写'}</span>
            <button type="button" class="btn danger" data-remove="${escapeHtml(draft.record_id)}">移除</button>
          </div>
          <div class="draft-body">
            <div class="two-col">
              <div class="field">
                <label>开始时间</label>
                <input type="datetime-local" data-key="start_time" data-id="${escapeHtml(draft.record_id)}" value="${escapeHtml(draft.start_time)}" />
              </div>
              <div class="field">
                <label>结束时间</label>
                <input type="datetime-local" data-key="end_time" data-id="${escapeHtml(draft.record_id)}" value="${escapeHtml(draft.end_time)}" />
              </div>
              <div class="field full">
                <label>位置</label>
                <textarea data-key="location" data-id="${escapeHtml(draft.record_id)}">${escapeHtml(draft.location)}</textarea>
              </div>
              <div class="field full">
                <label>内容</label>
                <textarea data-key="content" data-id="${escapeHtml(draft.record_id)}">${escapeHtml(draft.content)}</textarea>
              </div>
              <div class="field full">
                <label>原因</label>
                <textarea data-key="reason" data-id="${escapeHtml(draft.record_id)}">${escapeHtml(draft.reason)}</textarea>
              </div>
              <div class="field full">
                <label>影响</label>
                <textarea data-key="impact" data-id="${escapeHtml(draft.record_id)}">${escapeHtml(draft.impact)}</textarea>
              </div>
            </div>
          </div>
        `;
        card.querySelector('.draft-head').addEventListener('click', (event) => {
          if (event.target.closest('[data-remove]')) return;
          toggleDraft(draft.record_id);
        });
        card.querySelector('[data-remove]').addEventListener('click', (event) => {
          event.stopPropagation();
          state.drafts = state.drafts.filter((item) => item.record_id !== draft.record_id);
          state.selectedIds.delete(draft.record_id);
          if (state.openDraftId === draft.record_id) state.openDraftId = state.drafts[0]?.record_id || '';
          renderDrafts();
          renderRecords();
        });
        el.draftList.appendChild(card);
      });

      el.draftList.querySelectorAll('[data-key]').forEach((input) => {
        input.addEventListener('input', () => {
          const draft = state.drafts.find((item) => item.record_id === input.dataset.id);
          if (!draft) return;
          draft[input.dataset.key] = input.value;
        });
      });
      renderCombinedOutput();
      updateCounters();
    }

    function renderCombinedOutput() {
      const text = state.drafts.map((draft) => draft.preview).filter(Boolean).join('\n-------------------------------------------------------------\n');
      el.combinedOutput.textContent = text;
    }

    async function generateAll() {
      if (!state.drafts.length) {
        alert('请先加入待生成记录。');
        return;
      }
      const payload = {
        drafts: state.drafts.map((draft) => ({
          record_id: draft.record_id,
          start_time: draft.start_time,
          end_time: draft.end_time,
          location: draft.location,
          content: draft.content,
          reason: draft.reason,
          impact: draft.impact,
        })),
      };
      const data = await apiPost('/api/generate', payload);
      data.items.forEach((item) => {
        const draft = state.drafts.find((entry) => entry.record_id === item.record_id);
        if (draft) draft.preview = item.text;
      });
      renderDrafts();
    }

    async function copyAll() {
      const text = state.drafts.map((draft) => draft.preview).filter(Boolean).join('\n-------------------------------------------------------------\n');
      if (!text) {
        alert('请先生成模板文本。');
        return;
      }
      await navigator.clipboard.writeText(text);
      alert('已复制。');
    }

    function pruneSelection() {
      const visibleIds = new Set(state.records.map((record) => record.record_id));
      const draftIds = getDraftIdSet();
      state.selectedIds = new Set(
        [...state.selectedIds].filter((id) => visibleIds.has(id) || draftIds.has(id))
      );
      draftIds.forEach((id) => state.selectedIds.add(id));
    }

    async function refreshRecords() {
      const qs = new URLSearchParams({
        month: el.monthSelect.value,
        specialty: el.specialtySelect.value,
        building: el.buildingSelect.value,
      });
      const data = await apiGet(`/api/records?${qs.toString()}`);
      state.records = data.records;
      state.maintenanceOptions = data.maintenance_options;
      el.statusFilter.textContent = data.maintenance_status || '未开始';
      pruneSelection();
      renderRecords();
    }

    async function bootstrap() {
      const data = await apiGet('/api/bootstrap');
      state.bootstrap = data;
      fillSelect(el.monthSelect, data.filters.months, false);
      fillSelect(el.specialtySelect, data.filters.specialties, true);
      fillSelect(el.buildingSelect, data.filters.buildings, true);
      el.monthSelect.value = data.filters.default_month;
      state.records = data.records;
      state.maintenanceOptions = data.maintenance_options;
      el.statusFilter.textContent = data.maintenance_status || '未开始';
      el.sourceInfo.textContent = `${data.last_loaded_at || '未刷新'} / ${data.table_id}`;
      renderRecords();
      renderDrafts();
    }

    [el.monthSelect, el.specialtySelect, el.buildingSelect].forEach((node) => {
      node.addEventListener('change', refreshRecords);
    });
    el.maintenanceSearch.addEventListener('input', renderRecords);
    el.selectAllButton.addEventListener('click', () => {
      state.visibleMaintenanceOptions.forEach((item) => state.selectedIds.add(item.record_id));
      renderRecords();
    });
    el.clearSelectionButton.addEventListener('click', () => {
      state.selectedIds.clear();
      state.drafts = [];
      state.openDraftId = '';
      el.combinedOutput.textContent = '';
      renderDrafts();
      renderRecords();
    });
    el.refreshButton.addEventListener('click', async () => {
      await apiGet('/api/refresh');
      state.selectedIds.clear();
      state.drafts = [];
      await bootstrap();
    });
    el.addDraftsButton.addEventListener('click', addDrafts);
    el.generateAllButton.addEventListener('click', generateAll);
    el.copyAllButton.addEventListener('click', copyAll);
    el.closeDetailButton.addEventListener('click', closeDetail);
    el.detailModal.addEventListener('click', (event) => {
      if (event.target === el.detailModal) closeDetail();
    });
    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeDetail();
    });

    bootstrap().catch((error) => {
      document.body.innerHTML = `<pre style="padding:24px;color:#900;line-height:1.7;">加载失败：${escapeHtml(error.message)}</pre>`;
    });
  </script>
</body>
</html>
